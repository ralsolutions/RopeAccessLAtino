function timeAgo(iso) {
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'ahora';
  if(diff < 3600) return Math.floor(diff/60) + 'm';
  if(diff < 86400) return Math.floor(diff/3600) + 'h';
  if(diff < 604800) return Math.floor(diff/86400) + 'd';
  return new Date(iso).toLocaleDateString('es', {day:'numeric',month:'short'});
}

  loginLogo:{width:72,height:72,borderRadius:18,margin:'0 auto 16px',background:'var(--bg-deep)',position:'relative',overflow:'hidden'},
  loginLogoRing:{position:'absolute',inset:0,borderRadius:18,padding:3,background:'var(--rainbow)',backgroundSize:'200% 200%',animation:'rainbowBorder 4s ease infinite'},
  loginLogoInner:{position:'absolute',inset:3,borderRadius:15,background:'var(--bg-deep)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:900,color:'#fff',fontFamily:"'Outfit',sans-serif"},
  loginTitle:{fontSize:22,fontWeight:800,color:'var(--text)',fontFamily:"'Outfit',sans-serif",marginBottom:4},
  loginSub:{fontSize:12,color:'var(--text-dim)'},
  loginBody:{padding:'24px 32px 32px'},
  onlineBar:{display:'flex',gap:6,padding:'8px 14px',alignItems:'center',borderBottom:'1px solid var(--border)'},
  onlineDot:{width:8,height:8,borderRadius:'50%',background:'var(--success)',flexShrink:0,animation:'pulse 2s ease infinite'},
  onlineText:{fontSize:10,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace",fontWeight:600,letterSpacing:0.5},
  testOption:{padding:'14px 16px',background:'var(--bg-raised)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',marginBottom:10,cursor:'pointer',transition:'all 0.2s ease',display:'flex',alignItems:'center',justifyContent:'space-between'},
  testOptionSelected:{background:'var(--accent-bg)',borderColor:'var(--accent)',boxShadow:'0 0 0 1px var(--accent)'},
  testScore:{fontSize:13,fontWeight:700,color:'var(--accent-text)',marginLeft:10},
  adviceCard:{background:'var(--bg-raised)',border:'1px solid var(--warn)',borderRadius:'var(--radius-lg)',padding:'20px',marginTop:16},

function getAvatarColor(name) {
  const colors = ['#e74c3c','#2ecc40','#f1c40f','#6cb4ee','#e84393','#22d3ee','#a78bfa','#f97316','#14b8a6','#8b5cf6'];
  let h = 0; for(let i=0;i<(name||'').length;i++) h = ((h<<5)-h)+name.charCodeAt(i);
  return colors[Math.abs(h) % colors.length];
}
function Avatar({name,size=30,style:extra}) {
  const c = getAvatarColor(name);
  return <div style={{...S.postAvatar,width:size,height:size,background:c+'22',color:c,fontSize:Math.round(size*0.43),...extra}}>
    {(name||'?').charAt(0).toUpperCase()}
  </div>;
}
function RoleBadge({role,style:extra}) {
  const bg = role==='admin'?'var(--danger-bg)':role==='member'?'var(--member-bg)':'var(--bg-raised)';
  const color = ROLE_COLORS[role]||'var(--text-dim)';
  return <span style={{...S.postAuthorRole,background:bg,color,...extra}}>{ROLES[role]||role}</span>;
}

function LoginScreen({onLogin}) {
  const [name, setName] = useState('');
  const [country, setCountry] = useState('');
  const [level, setLevel] = useState('');
  const submit = () => {
    if(!name.trim()) return;
    onLogin({id:'u-'+uid(), name:name.trim(), country:country.trim(), level, role:'guest', testPassed: false, createdAt:new Date().toISOString()});
  };
  return (
  <div style={S.loginWrap}>
    <div style={S.loginCard} className="fade-in">
      <div style={S.loginHeader}>
        <div style={S.loginLogo}>
          <div style={S.loginLogoRing}/>
          <div style={S.loginLogoInner}>RAL</div>
        </div>
        <div style={S.loginTitle}>Rope Access Latino</div>
        <div style={S.loginSub}>Community · La comunidad latina de rope access</div>
      </div>
      <div style={S.loginBody}>
        <label style={S.label}>Tu nombre *</label>
        <input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre completo" autoFocus
          onKeyDown={e=>{if(e.key==='Enter')submit();}}/>
        <div style={S.row2}>
          <div>
            <label style={S.label}>País</label>
            <input style={S.input} value={country} onChange={e=>setCountry(e.target.value)} placeholder="e.g. Argentina"/>
          </div>
          <div>
            <label style={S.label}>Certificación</label>
            <select style={S.select} value={level} onChange={e=>setLevel(e.target.value)}>
              <option value="">— Seleccionar —</option>
              {IRATA_LEVELS.filter(Boolean).map(l=><option key={l} value={l}>{l}</option>)}
            </select>
          </div>
        </div>
        <button style={{...S.primaryBtn,width:'100%',padding:'12px',fontSize:13,marginTop:4}} onClick={submit}>
          Entrar a la comunidad →
        </button>
        <div style={{fontSize:10,color:'var(--text-faint)',textAlign:'center',marginTop:14,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.5}}>
          Demo mode — en producción esto será auth con Supabase
        </div>
      </div>
    </div>
  </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// ✨ TEST MEJORADO con texto actualizado y leyendas dinámicas
// ═══════════════════════════════════════════════════════════════════════════
function TestModal({ onClose, onPass }) {
  const [answers, setAnswers] = useState({});
  const [age, setAge] = useState('');
  const [visa, setVisa] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(0);
  const [passed, setPassed] = useState(false);
  const [advice, setAdvice] = useState('');
  const [shuffledOptions, setShuffledOptions] = useState({});
  const [ageError, setAgeError] = useState('');

  // Preguntas con la modificación solicitada: "Ninguna (oficinista u otros con poca intervención motriz o similar)"
  const TEST_QUESTIONS = [
    { id: 'eng', emoji: '🎓', text: '¿Cuál es tu nivel de inglés?', options: [
        { label: 'C1+ (Avanzado o nativo)', points: 10 },
        { label: 'B2 (Intermedio alto)', points: 8 },
        { label: 'B1 (Intermedio - suficiente para instrucciones)', points: 5 },
        { label: 'A2 (Básico)', points: 0 },
        { label: 'A1 (Muy básico)', points: -2 }
    ]},
    { id: 'climb', emoji: '🧗', text: 'Experiencia previa en escalada o altura', options: [
        { label: 'Avanzada (escalador regular o profesional)', points: 10 },
        { label: 'Moderada (escalada deportiva o trabajos ocasionales)', points: 5 },
        { label: 'Básica (he escalado algunas veces)', points: 2 },
        { label: 'Ninguna', points: 0 }
    ]},
    { id: 'trade', emoji: '🔧', text: '¿Tienes algún oficio? (carpintero, pintor, etc.)', options: [
        { label: 'Sí, varios años', points: 10 },
        { label: 'Sí, pero poca experiencia', points: 2 },
        { label: 'No', points: 0 }
    ]},
    { id: 'fitness', emoji: '💪', text: 'Describe tu condición física actual', options: [
        { label: 'Atleta', points: 12 },
        { label: 'Muy buena (4+ veces/semana)', points: 8 },
        { label: 'Buena (entreno 2-3 veces/semana)', points: 6 },
        { label: 'Regular (ejercicio ocasional)', points: -2 },
        { label: 'Mala (sedentario)', points: -5 }
    ]},
    { id: 'workexp', emoji: '🏗️', text: 'Experiencia laboral en trabajos físicos', options: [
        { label: 'Bastante (años en construcción, mantenimiento)', points: 10 },
        { label: 'Alguna (trabajos eventuales físicos)', points: 3 },
        { label: 'Ninguna (oficinista u otros con poca intervención motriz o similar)', points: 0 }   // ← texto cambiado
    ]},
    { id: 'teamwork', emoji: '🤝', text: 'Trabajo en equipo y comunicación', options: [
        { label: 'Muy bien (liderazgo, comunicación clara)', points: 12 },
        { label: 'Bien (colaboro activamente)', points: 5 },
        { label: 'Regular (lo necesario)', points: 0 },
        { label: 'Poco (prefiero solo)', points: -3 }
    ]}
  ];

  useEffect(() => {
    const shuffled = {};
    TEST_QUESTIONS.forEach(q => {
      const copy = [...q.options];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      shuffled[q.id] = copy;
    });
    setShuffledOptions(shuffled);
  }, []);

  const handleAnswer = (qId, points) => {
    setAnswers(prev => ({ ...prev, [qId]: points }));
  };

  const getAgePoints = (ageNum) => {
    if (ageNum < 18) return null;
    if (ageNum >= 18 && ageNum <= 25) return 5;
    if (ageNum > 25 && ageNum <= 30) return 10;
    if (ageNum > 30 && ageNum <= 40) return 5;
    if (ageNum > 40 && ageNum < 45) return -5;
    if (ageNum >= 45) return 0;
    return 0;
  };

  const getVisaPoints = (visaType) => {
    switch (visaType) {
      case 'resident': return 12;
      case 'wh6': return 8;
      case 'wh3_6': return 5;
      case 'wh_less3': return 2;
      case 'turista': return -5;
      case 'student': return -5;
      default: return 0;
    }
  };

  // ---------- LEYENDAS DINÁMICAS (independientes del puntaje total) ----------
  const generarLeyendasPorPerfil = (respuestas, edad, tipoVisa) => {
    let leyendas = [];
    const nivelIngles = respuestas.eng; // puntos de inglés (menor a 5 = bajo)
    const condFisica = respuestas.fitness;
    const experienciaFisica = respuestas.workexp;
    const edadNum = parseInt(edad);

    // 1. Inglés bajo (puntos <= 0 o etiqueta A1/A2)
    if (nivelIngles !== undefined && nivelIngles <= 0) {
      leyendas.push('📘 <strong>Recomendación:</strong> Estudiar inglés. Realiza el test gratuito de Preply → <a href="https://preply.com/en/language-tests/english/questions" target="_blank" style="color:var(--accent-text)">Preply English Test</a> y considera tomar clases online (desde 10 NZD/hora).');
    }

    // 2. Visa de turista o estudiante
    if (tipoVisa === 'turista') {
      leyendas.push('⚠️ <strong>Recomendación sobre visa:</strong> No hacer el curso si lo que esperas es lograr un sponsor laboral. Las chances son extremadamente bajas. Busca primero una Working Holiday o residencia.');
    } else if (tipoVisa === 'student') {
      leyendas.push('⚠️ <strong>Recomendación sobre visa:</strong> Si eres estudiante, puedes hacer el curso, pero ten expectativas realistas: obtener un sponsor es muy difícil. Aprovecha para mejorar inglés y condición física.');
    }

    // 3. Working Holiday con menos de 6 meses + mal inglés + mala condición física
    const esWhCorta = (tipoVisa === 'wh_less3' || tipoVisa === 'wh3_6');
    const inglesMalo = nivelIngles !== undefined && nivelIngles <= 0;
    const fitnessMala = condFisica !== undefined && condFisica <= -2; // regular o mala
    if (esWhCorta && inglesMalo && fitnessMala) {
      leyendas.push('📌 <strong>Recomendación integral:</strong> Trabaja en mejorar tu inglés (test Preply), realiza ejercicios 3 veces/semana (sentadillas, flexiones, plancha), y busca trabajos de construcción para ganar experiencia física antes de invertir en IRATA.');
    }

    // 4. Si experiencia física es "ninguna" (puntos 0) sugerir trabajos de construcción
    if (experienciaFisica === 0) {
      leyendas.push('🏗️ <strong>Sin experiencia en trabajos físicos:</strong> Antes de hacer el curso, te recomendamos trabajar unos meses en construcción en NZ para aprender la cultura laboral, seguridad y exigencia física. Es un gran punto de partida.');
    }

    // 5. Entrenamiento físico recomendado (si condición no es buena o atleta)
    if (condFisica !== undefined && condFisica < 6) {
      leyendas.push('💪 <strong>Entrenamiento físico recomendado:</strong> 3 veces por semana, 40 minutos: sentadillas, flexiones y plancha (plank). Esas 3 cosas son el core para trabajar en altura.');
    }

    // 6. Edad >45
    if (edadNum >= 45) {
      leyendas.push('⚠️ <strong>Edad avanzada:</strong> El rope access es físicamente muy demandante. Se necesitan aproximadamente 5 años para alcanzar un rol de supervisor más liviano. Evalúa seriamente tu condición física y objetivos.');
    }

    // 7. Temporada alta y recomendación general
    leyendas.push('📅 <strong>Temporada alta de trabajos:</strong> Septiembre a Junio. El otoño/invierno es el momento ideal para hacer el curso. Si no tenés experiencia en oficios, podés empezar trabajos de construcción para aprender cómo es la cultura de trabajo en New Zealand, y paralelamente aplicar a trabajos de rope access.');

    return leyendas;
  };

  const calculateScore = () => {
    const ageNum = parseInt(age);
    if (isNaN(ageNum)) {
      setAgeError('Por favor ingresa tu edad');
      return;
    }
    if (ageNum < 18) {
      setAgeError('❌ Debes ser mayor de 18 años para realizar el test. El rope access requiere madurez y responsabilidad.');
      return;
    }
    setAgeError('');
    
    if (!visa) {
      alert('Por favor selecciona tu situación migratoria / tipo de visa');
      return;
    }

    let total = 0;
    TEST_QUESTIONS.forEach(q => {
      const selected = answers[q.id];
      if (selected !== undefined) total += selected;
    });
    const agePoints = getAgePoints(ageNum);
    total += agePoints;
    const visaPoints = getVisaPoints(visa);
    total += visaPoints;

    const passedFlag = total >= 60;
    
    // Construcción del mensaje base (puntaje y consejos generales)
    let adviceMsg = '';
    if (!passedFlag) {
      adviceMsg += `❌ No alcanzaste los 60 puntos (obtuviste ${total}/86). Para mejorar tu perfil:\n`;
      if ((answers.eng||0) < 5) adviceMsg += '🎓 Mejora tu inglés al menos a nivel B1 (intermedio).\n';
      if ((answers.climb||0) < 5) adviceMsg += '🧗 Practica escalada en gimnasio o actividades en altura.\n';
      if ((answers.trade||0) < 2) adviceMsg += '🔧 Desarrolla un oficio manual (carpintería, pintura, etc.).\n';
      if ((answers.fitness||0) < 6) adviceMsg += '💪 Mejora tu condición física (entrena al menos 3 veces por semana).\n';
      if ((answers.workexp||0) < 5) adviceMsg += '🏗️ Busca trabajos eventuales en construcción o mantenimiento.\n';
      if ((answers.teamwork||0) < 5) adviceMsg += '🤝 Trabaja en tu comunicación y trabajo en equipo.\n';
      if (agePoints < 5 && ageNum >= 18) adviceMsg += `📅 Tu edad (${ageNum}) te da pocos puntos. ${ageNum >= 45 ? 'El rope access es muy demandante físicamente, evalúa bien.' : 'El rango óptimo es 25-30 años.'}\n`;
    } else {
      adviceMsg += `✅ ¡Excelente! Obtuviste ${total}/86 puntos. Tienes un perfil muy apto para iniciar el camino en rope access.\n`;
    }

    // Agregar leyendas dinámicas (independientes del puntaje)
    const leyendas = generarLeyendasPorPerfil(answers, age, visa);
    if (leyendas.length > 0) {
      adviceMsg += '\n✨ <strong>Recomendaciones personalizadas según tu perfil:</strong>\n' + leyendas.map(l => '• ' + l).join('\n');
    }

    // Aviso adicional sobre certificación IRATA (si aplica)
    adviceMsg += '\n\n📌 <strong>Importante:</strong> Obtener una certificación IRATA no te da derecho a trabajar. El rope access se trabaja en equipos, por lo que los primeros años es fundamental trabajar con una empresa para entender todo el tema de seguridad, inspección de equipos, permisos y aprender a realizar trabajos de forma segura en altura.';

    setScore(total);
    setPassed(passedFlag);
    setAdvice(adviceMsg);
    setSubmitted(true);
    if (passedFlag) onPass();
  };

  const allQuestionsAnswered = TEST_QUESTIONS.every(q => answers[q.id] !== undefined);
  const hasAge = age !== '' && parseInt(age) >= 18;
  const hasVisa = visa !== '';
  const allDataReady = allQuestionsAnswered && hasAge && hasVisa && !ageError;
  const answeredCount = Object.keys(answers).length;
  const progress = (answeredCount / TEST_QUESTIONS.length) * 100;

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={S.modal} onClick={e=>e.stopPropagation()} className="fade-in">
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalKicker}>🧗 TEST DE APTITUD · SIN PISTAS · OPCIONES MEZCLADAS</div>
            <div style={S.modalTitle}>¿Me conviene hacer el curso de rope access?</div>
          </div>
          <button style={S.closeBtn} onClick={onClose}>×</button>
        </div>
        <div style={S.modalBody}>
          {!submitted ? (
            <>
              <div style={{background:'var(--border)', height:6, borderRadius:3, marginBottom:20}}>
                <div style={{width:`${progress}%`, background:'var(--accent)', height:6, borderRadius:3, transition:'width 0.2s'}}/>
              </div>
              <div style={{marginBottom: 18, fontSize: 12, color: 'var(--text-muted)', textAlign: 'center'}}>
                🎲 Cada vez que abrís el test, las opciones se mezclan — leé con atención
              </div>

              {TEST_QUESTIONS.map(q => {
                const opts = shuffledOptions[q.id] || q.options;
                return (
                  <div key={q.id} style={{marginBottom: 28}}>
                    <label style={{...S.label, fontSize: 12, marginBottom: 10}}>
                      {q.emoji} {q.text}
                    </label>
                    <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
                      {opts.map(opt => {
                        const isSelected = answers[q.id] === opt.points;
                        return (
                          <div
                            key={opt.label}
                            style={{
                              ...S.testOption,
                              ...(isSelected ? S.testOptionSelected : {}),
                              justifyContent: 'flex-start',
                              gap: 12
                            }}
                            onClick={() => handleAnswer(q.id, opt.points)}
                          >
                            <span style={{fontSize: 15, fontWeight: 500, color: isSelected ? 'var(--accent-text)' : 'var(--text)'}}>
                              {opt.label}
                            </span>
                            {isSelected && <span style={{marginLeft: 'auto', fontSize: 18}}>✓</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              <div style={{marginBottom: 24}}>
                <label style={S.label}>🎂 Edad (años)</label>
                <input
                  type="number"
                  min="1"
                  max="120"
                  style={S.input}
                  value={age}
                  onChange={(e) => {
                    setAge(e.target.value);
                    setAgeError('');
                  }}
                  placeholder="Ej: 28"
                />
                {ageError && <div style={{color:'var(--danger)', fontSize:12, marginTop:-8, marginBottom:8}}>{ageError}</div>}
                <div style={{fontSize:10, color:'var(--text-faint)', marginTop:4}}>
                  Rangos: 18-25 → +5 | 26-30 → +10 | 31-40 → +5 | 41-44 → -5 | ≥45 → 0 (no recomendado)
                </div>
              </div>

              <div style={{marginBottom: 24}}>
                <label style={S.label}>🛂 Situación migratoria / Visa</label>
                <select style={S.select} value={visa} onChange={(e) => setVisa(e.target.value)}>
                  <option value="">Seleccionar...</option>
                  <option value="resident">Residente o Ciudadano (+12)</option>
                  <option value="wh6">Working Holiday (6 meses o más) (+8)</option>
                  <option value="wh3_6">Working Holiday (entre 3 y 6 meses) (+5)</option>
                  <option value="wh_less3">Working Holiday (menos de 3 meses) (+2)</option>
                  <option value="student">Visa de Estudiante (-5)</option>
                  <option value="turista">Visa de Turista (-5)</option>
                </select>
                <div style={{fontSize:10, color:'var(--text-faint)', marginTop:4}}>
                  ⚠️ Visas de turista o estudiante dificultan obtener sponsor laboral.
                </div>
              </div>

              <button style={{...S.primaryBtn, width: '100%', padding: '14px', fontSize: 14, marginTop: 8}} 
                disabled={!allDataReady} onClick={calculateScore}>
                🎯 Calificar mi perfil
              </button>
            </>
          ) : (
            <div>
              <div style={{textAlign: 'center', marginBottom: 20}}>
                <div style={{fontSize: 56}}>{passed ? '🎉🏆✨' : '📘💪📈'}</div>
                <div style={{fontSize: 32, fontWeight: 800, marginTop: 8, background: 'var(--rainbow)', WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent'}}>{score}/86</div>
                <div style={{color: passed ? 'var(--success)' : 'var(--warn)', fontWeight: 700, fontSize: 14, marginTop: 6}}>
                  {passed ? '✅ ¡Aprobado! Se desbloquean secciones privadas' : '❌ No alcanzaste el mínimo (60 puntos)'}
                </div>
              </div>
              <div style={{...S.adviceCard, background: 'var(--bg-raised)', padding: '18px', borderRadius: 'var(--radius-lg)', marginBottom: 16}}>
                <div style={{whiteSpace: 'pre-wrap', fontFamily: 'inherit', fontSize: 13, lineHeight: 1.5, margin: 0}} dangerouslySetInnerHTML={{__html: advice.replace(/\n/g, '<br/>')}} />
              </div>
              <div style={{fontSize: 11, color: 'var(--text-faint)', textAlign: 'center', marginTop: 12, borderTop: '1px solid var(--border)', paddingTop: 12}}>
                📌 Test diseñado con la experiencia de <strong>Lionel Melo</strong>, técnico IRATA Nivel 3 e instructor.
              </div>
              {passed && (
                <button style={{...S.primaryBtn, width: '100%', marginTop: 20, padding: '12px'}} onClick={onClose}>
                  🧗 Continuar a la comunidad →
                </button>
              )}
              {!passed && (
                <button style={{...S.cancelBtn, width: '100%', marginTop: 20, padding: '12px'}} onClick={onClose}>
                  Cerrar (puedes reintentar luego)
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
