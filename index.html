function timeAgo(iso) {
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'ahora';
  if(diff < 3600) return Math.floor(diff/60) + 'm';
  if(diff < 86400) return Math.floor(diff/3600) + 'h';
  if(diff < 604800) return Math.floor(diff/86400) + 'd';
  return new Date(iso).toLocaleDateString('es', {day:'numeric',month:'short'});
}

// ═══════════════════════════════════════════════════════════════════════════
// AVATAR & ROLE BADGE
// ═══════════════════════════════════════════════════════════════════════════
function getAvatarColor(name) {
  const colors = ['#e74c3c','#2ecc40','#f1c40f','#6cb4ee','#e84393','#22d3ee','#a78bfa','#f97316','#14b8a6','#8b5cf6'];
  let h = 0; for(let i=0;i<(name||'').length;i++) h = ((h<<5)-h)+name.charCodeAt(i);
  return colors[Math.abs(h) % colors.length];
}
function Avatar({name,size=30,style:extra}) {
  const c = getAvatarColor(name);
  return <div style={{...S.postAvatar,width:size,height:size,background:c+'22',color:c,fontSize:Math.round(size*0.43),...extra}}>
    {(name||'?').charAt(0).toUpperCase()}
  </div>;
}
function RoleBadge({role,style:extra}) {
  const bg = role==='admin'?'var(--danger-bg)':role==='member'?'var(--member-bg)':'var(--bg-raised)';
  const color = ROLE_COLORS[role]||'var(--text-dim)';
  return <span style={{...S.postAuthorRole,background:bg,color,...extra}}>{ROLES[role]||role}</span>;
}

// ═══════════════════════════════════════════════════════════════════════════
// ✨ TEST MEJORADO (con edad, visa, nuevos puntajes y advertencias de sponsor)
// ═══════════════════════════════════════════════════════════════════════════
function TestModal({ onClose, onPass }) {
  const [answers, setAnswers] = useState({});
  const [age, setAge] = useState('');
  const [visa, setVisa] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(0);
  const [passed, setPassed] = useState(false);
  const [advice, setAdvice] = useState('');
  const [shuffledOptions, setShuffledOptions] = useState({});
  const [ageError, setAgeError] = useState('');

  // Definición de preguntas con sus opciones y puntajes (según especificación)
  const TEST_QUESTIONS = [
    { id: 'eng', emoji: '🎓', text: '¿Cuál es tu nivel de inglés?', options: [
        { label: 'C1+ (Avanzado o nativo)', points: 10 },
        { label: 'B2 (Intermedio alto)', points: 8 },
        { label: 'B1 (Intermedio - suficiente para instrucciones)', points: 5 },
        { label: 'A2 (Básico)', points: 0 },
        { label: 'A1 (Muy básico)', points: -2 }
    ]},
    { id: 'climb', emoji: '🧗', text: 'Experiencia previa en escalada o altura', options: [
        { label: 'Avanzada (escalador regular o profesional)', points: 10 },
        { label: 'Moderada (escalada deportiva o trabajos ocasionales)', points: 5 },
        { label: 'Básica (he escalado algunas veces)', points: 2 },
        { label: 'Ninguna', points: 0 }
    ]},
    { id: 'trade', emoji: '🔧', text: '¿Tienes algún oficio? (carpintero, pintor, etc.)', options: [
        { label: 'Sí, varios años', points: 10 },
        { label: 'Sí, pero poca experiencia', points: 2 },
        { label: 'No', points: 0 }
    ]},
    { id: 'fitness', emoji: '💪', text: 'Describe tu condición física actual', options: [
        { label: 'Atleta', points: 12 },
        { label: 'Muy buena (4+ veces/semana)', points: 8 },
        { label: 'Buena (entreno 2-3 veces/semana)', points: 6 },
        { label: 'Regular (ejercicio ocasional)', points: -2 },
        { label: 'Mala (sedentario)', points: -5 }
    ]},
    { id: 'workexp', emoji: '🏗️', text: 'Experiencia laboral en trabajos físicos', options: [
        { label: 'Bastante (años en construcción, mantenimiento)', points: 10 },
        { label: 'Alguna (trabajos eventuales físicos)', points: 3 },
        { label: 'Ninguna (oficinista, sin manual)', points: 0 }
    ]},
    { id: 'teamwork', emoji: '🤝', text: 'Trabajo en equipo y comunicación', options: [
        { label: 'Muy bien (liderazgo, comunicación clara)', points: 12 },
        { label: 'Bien (colaboro activamente)', points: 5 },
        { label: 'Regular (lo necesario)', points: 0 },
        { label: 'Poco (prefiero solo)', points: -3 }
    ]}
  ];

  // Mezclar opciones al montar
  useEffect(() => {
    const shuffled = {};
    TEST_QUESTIONS.forEach(q => {
      const copy = [...q.options];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      shuffled[q.id] = copy;
    });
    setShuffledOptions(shuffled);
  }, []);

  const handleAnswer = (qId, points) => {
    setAnswers(prev => ({ ...prev, [qId]: points }));
  };

  // Calcular puntos según edad
  const getAgePoints = (ageNum) => {
    if (ageNum < 18) return null; // inválido
    if (ageNum >= 18 && ageNum <= 25) return 5;
    if (ageNum > 25 && ageNum <= 30) return 10;
    if (ageNum > 30 && ageNum <= 40) return 5;
    if (ageNum > 40 && ageNum < 45) return -5;
    if (ageNum >= 45) return 0; // no recomendado, 0 puntos
    return 0;
  };

  // Calcular puntos según visa
  const getVisaPoints = (visaType) => {
    switch (visaType) {
      case 'resident': return 12;
      case 'wh6': return 8;
      case 'wh3_6': return 5;
      case 'wh_less3': return 2;
      case 'turista': return -5;
      case 'student': return -5;
      default: return 0;
    }
  };

  // Obtener mensaje específico de visa para advertencia de sponsor
  const getVisaWarning = (visaType) => {
    if (visaType === 'turista' || visaType === 'student' || visaType === 'wh_less3') {
      return '⚠️ IMPORTANTE: Con visa de turista, estudiante o Working Holiday con menos de 3 meses de validez, obtener un certificado IRATA NO garantiza conseguir un sponsor laboral. Lo ideal es tener al menos una Working Holiday Visa con mínimo 3 meses restantes (idealmente 6 meses) y llegar entre septiembre y junio para buscar trabajo inmediatamente después del curso.';
    }
    if (visaType === 'wh3_6') {
      return '⚠️ Atención: Tu visa Working Holiday tiene entre 3 y 6 meses. Es un tiempo justo para certificarte y buscar trabajo. Asegúrate de llegar con el curso ya planificado y empezar a buscar sponsor desde el día 1.';
    }
    return '';
  };

  const calculateScore = () => {
    // Validaciones de edad
    const ageNum = parseInt(age);
    if (isNaN(ageNum)) {
      setAgeError('Por favor ingresa tu edad');
      return;
    }
    if (ageNum < 18) {
      setAgeError('❌ Debes ser mayor de 18 años para realizar el test. El rope access requiere madurez y responsabilidad.');
      return;
    }
    setAgeError('');
    
    if (!visa) {
      alert('Por favor selecciona tu situación migratoria / tipo de visa');
      return;
    }

    let total = 0;
    TEST_QUESTIONS.forEach(q => {
      const selected = answers[q.id];
      if (selected !== undefined) total += selected;
    });
    const agePoints = getAgePoints(ageNum);
    total += agePoints;
    const visaPoints = getVisaPoints(visa);
    total += visaPoints;

    // Umbral de aprobación: 60 puntos (máximo posible 86)
    const passedFlag = total >= 60;
    let adviceMsg = '';

    // Construcción del mensaje de consejos
    if (!passedFlag) {
      adviceMsg = `❌ No alcanzaste los 60 puntos (obtuviste ${total}/86). Para mejorar tu perfil:\n`;
      // Analizar puntos bajos
      if ((answers.eng||0) < 5) adviceMsg += '🎓 Mejora tu inglés al menos a nivel B1 (intermedio).\n';
      if ((answers.climb||0) < 5) adviceMsg += '🧗 Practica escalada en gimnasio o actividades en altura.\n';
      if ((answers.trade||0) < 2) adviceMsg += '🔧 Desarrolla un oficio manual (carpintería, pintura, etc.).\n';
      if ((answers.fitness||0) < 6) adviceMsg += '💪 Mejora tu condición física (entrena al menos 3 veces por semana).\n';
      if ((answers.workexp||0) < 5) adviceMsg += '🏗️ Busca trabajos eventuales en construcción o mantenimiento.\n';
      if ((answers.teamwork||0) < 5) adviceMsg += '🤝 Trabaja en tu comunicación y trabajo en equipo.\n';
      if (agePoints < 5 && ageNum >= 18) adviceMsg += `📅 Tu edad (${ageNum}) te da pocos puntos. ${ageNum >= 45 ? 'El rope access es muy demandante físicamente, evalúa bien.' : 'El rango óptimo es 25-30 años.'}\n`;
    } else {
      adviceMsg = `✅ ¡Excelente! Obtuviste ${total}/86 puntos. Tienes un perfil muy apto para iniciar el camino en rope access.\n`;
    }

    // Agregar advertencia de visa si aplica
    const visaWarning = getVisaWarning(visa);
    if (visaWarning) adviceMsg += '\n' + visaWarning + '\n';

    // Mensaje específico para mayores de 45
    if (ageNum >= 45) {
      adviceMsg += '\n⚠️ Edad avanzada: El rope access es físicamente muy duro y se necesitan aproximadamente 5 años para alcanzar un rol de supervisor más liviano. Evalúa seriamente tu condición física y objetivos.\n';
    }

    // Si el usuario tiene visa turista/student, además recordar que el curso no garantiza sponsor
    if (visa === 'turista' || visa === 'student') {
      adviceMsg += '\n📌 Importante: Obtener una certificación IRATA no te da derecho a trabajar. Necesitarás una visa con permiso de trabajo (Working Holiday, Residencia, etc.) para ejercer legalmente.\n';
    }

    adviceMsg += '\n📘 Recursos recomendados: cursos de inglés gratuitos (Preply, Duolingo), entrenamiento de calistenia 3 veces/semana, y voluntariado en construcción.';

    setScore(total);
    setPassed(passedFlag);
    setAdvice(adviceMsg);
    setSubmitted(true);
    if (passedFlag) onPass();
  };

  const allQuestionsAnswered = TEST_QUESTIONS.every(q => answers[q.id] !== undefined);
  const hasAge = age !== '' && parseInt(age) >= 18;
  const hasVisa = visa !== '';
  const allDataReady = allQuestionsAnswered && hasAge && hasVisa && !ageError;
  const answeredCount = Object.keys(answers).length;
  const progress = (answeredCount / TEST_QUESTIONS.length) * 100;

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={S.modal} onClick={e=>e.stopPropagation()} className="fade-in">
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalKicker}>🧗 TEST DE APTITUD · SIN PISTAS · OPCIONES MEZCLADAS</div>
            <div style={S.modalTitle}>¿Me conviene hacer el curso de rope access?</div>
          </div>
          <button style={S.closeBtn} onClick={onClose}>×</button>
        </div>
        <div style={S.modalBody}>
          {!submitted ? (
            <>
              <div style={{background:'var(--border)', height:6, borderRadius:3, marginBottom:20}}>
                <div style={{width:`${progress}%`, background:'var(--accent)', height:6, borderRadius:3, transition:'width 0.2s'}}/>
              </div>
              <div style={{marginBottom: 18, fontSize: 12, color: 'var(--text-muted)', textAlign: 'center'}}>
                🎲 Cada vez que abrís el test, las opciones se mezclan — leé con atención
              </div>

              {/* Preguntas principales */}
              {TEST_QUESTIONS.map(q => {
                const opts = shuffledOptions[q.id] || q.options;
                return (
                  <div key={q.id} style={{marginBottom: 28}}>
                    <label style={{...S.label, fontSize: 12, marginBottom: 10}}>
                      {q.emoji} {q.text}
                    </label>
                    <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
                      {opts.map(opt => {
                        const isSelected = answers[q.id] === opt.points;
                        return (
                          <div
                            key={opt.label}
                            style={{
                              ...S.testOption,
                              ...(isSelected ? S.testOptionSelected : {}),
                              justifyContent: 'flex-start',
                              gap: 12
                            }}
                            onClick={() => handleAnswer(q.id, opt.points)}
                          >
                            <span style={{fontSize: 15, fontWeight: 500, color: isSelected ? 'var(--accent-text)' : 'var(--text)'}}>
                              {opt.label}
                            </span>
                            {isSelected && <span style={{marginLeft: 'auto', fontSize: 18}}>✓</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              {/* Campo Edad */}
              <div style={{marginBottom: 24}}>
                <label style={S.label}>🎂 Edad (años)</label>
                <input
                  type="number"
                  min="1"
                  max="120"
                  style={S.input}
                  value={age}
                  onChange={(e) => {
                    setAge(e.target.value);
                    setAgeError('');
                  }}
                  placeholder="Ej: 28"
                />
                {ageError && <div style={{color:'var(--danger)', fontSize:12, marginTop:-8, marginBottom:8}}>{ageError}</div>}
                <div style={{fontSize:10, color:'var(--text-faint)', marginTop:4}}>
                  Rangos: 18-25 → +5 | 26-30 → +10 | 31-40 → +5 | 41-44 → -5 | ≥45 → 0 (no recomendado)
                </div>
              </div>

              {/* Campo Visa */}
              <div style={{marginBottom: 24}}>
                <label style={S.label}>🛂 Situación migratoria / Visa</label>
                <select style={S.select} value={visa} onChange={(e) => setVisa(e.target.value)}>
                  <option value="">Seleccionar...</option>
                  <option value="resident">Residente o Ciudadano (+12)</option>
                  <option value="wh6">Working Holiday (6 meses o más) (+8)</option>
                  <option value="wh3_6">Working Holiday (entre 3 y 6 meses) (+5)</option>
                  <option value="wh_less3">Working Holiday (menos de 3 meses) (+2)</option>
                  <option value="student">Visa de Estudiante (-5)</option>
                  <option value="turista">Visa de Turista (-5)</option>
                </select>
                <div style={{fontSize:10, color:'var(--text-faint)', marginTop:4}}>
                  ⚠️ Visas de turista o estudiante dificultan obtener sponsor laboral.
                </div>
              </div>

              <button style={{...S.primaryBtn, width: '100%', padding: '14px', fontSize: 14, marginTop: 8}} 
                disabled={!allDataReady} onClick={calculateScore}>
                🎯 Calificar mi perfil
              </button>
            </>
          ) : (
            <div>
              <div style={{textAlign: 'center', marginBottom: 20}}>
                <div style={{fontSize: 56}}>{passed ? '🎉🏆✨' : '📘💪📈'}</div>
                <div style={{fontSize: 32, fontWeight: 800, marginTop: 8, background: 'var(--rainbow)', WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent'}}>{score}/86</div>
                <div style={{color: passed ? 'var(--success)' : 'var(--warn)', fontWeight: 700, fontSize: 14, marginTop: 6}}>
                  {passed ? '✅ ¡Aprobado! Se desbloquean secciones privadas' : '❌ No alcanzaste el mínimo (60 puntos)'}
                </div>
              </div>
              <div style={{...S.adviceCard, background: 'var(--bg-raised)', padding: '18px', borderRadius: 'var(--radius-lg)', marginBottom: 16}}>
                <pre style={{whiteSpace: 'pre-wrap', fontFamily: 'inherit', fontSize: 13, lineHeight: 1.5, margin: 0}}>{advice}</pre>
              </div>
              <div style={{fontSize: 11, color: 'var(--text-faint)', textAlign: 'center', marginTop: 12, borderTop: '1px solid var(--border)', paddingTop: 12}}>
                📌 Test diseñado con la experiencia de <strong>Lionel Melo</strong>, técnico IRATA Nivel 3 e instructor.
              </div>
              {passed && (
                <button style={{...S.primaryBtn, width: '100%', marginTop: 20, padding: '12px'}} onClick={onClose}>
                  🧗 Continuar a la comunidad →
                </button>
              )}
              {!passed && (
                <button style={{...S.cancelBtn, width: '100%', marginTop: 20, padding: '12px'}} onClick={onClose}>
                  Cerrar (puedes reintentar luego)
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// CHANNEL VIEWS (idénticos al original, por brevedad se mantienen igual)
// ═══════════════════════════════════════════════════════════════════════════
function AnnouncementView({channel, posts, user, onNewPost, onDeletePost}) {
  const isAdmin = user?.role === 'admin';
  const sorted = [...(posts||[])].sort((a,b)=>{ if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1; return new Date(b.createdAt)-new Date(a.createdAt);});
  return (<div>{isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo anuncio</button></div>}{sorted.length===0?<div style={S.empty}><span style={S.emptyIcon}>📢</span><span style={S.emptyText}>Sin anuncios todavía</span></div>:sorted.map(p=>(<div key={p.id} style={{...S.postCard,...(p.pinned?S.postPinned:{}),cursor:'default'}}><div style={S.postAuthorRow}><Avatar name={p.author}/><span style={S.postAuthorName}>{p.author}</span><RoleBadge role={p.authorRole}/>{p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}<span style={S.postTime}>{timeAgo(p.createdAt)}</span></div><div style={S.postTitle}>{p.title}</div><div style={S.postBody}>{p.body}</div>{isAdmin && (<div style={S.postFooter}><span style={S.postStat} onClick={()=>onDeletePost(p.id)}>🗑 Eliminar</span></div>)}</div>))}</div>);
}
function DiscussionView({channel, posts, comments, user, onNewPost, onDeletePost, onAddComment, onDeleteComment}) {
  const isAdmin = user?.role === 'admin';
  const [expandedPost, setExpandedPost] = useState(null);
  const [commentText, setCommentText] = useState('');
  const sorted = [...(posts||[])].sort((a,b)=>{ if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1; return new Date(b.createdAt)-new Date(a.createdAt);});
  const submitComment = (postId) => { if(!commentText.trim()) return; onAddComment(postId, commentText.trim()); setCommentText(''); };
  return (<div>{isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo tema</button></div>}{sorted.length===0?<div style={S.empty}><span style={S.emptyIcon}>💬</span><span style={S.emptyText}>Sin temas todavía</span></div>:sorted.map(p=>{const postComments = comments[p.id] || []; const isExpanded = expandedPost === p.id; return (<div key={p.id} style={{marginBottom:16,animation:'fadeIn 0.25s ease-out'}}><div style={{...S.postCard,...(p.pinned?S.postPinned:{}),marginBottom:0,borderRadius:isExpanded?'var(--radius-lg) var(--radius-lg) 0 0':'var(--radius-lg)'}} onClick={()=>setExpandedPost(isExpanded?null:p.id)}><div style={S.postAuthorRow}><Avatar name={p.author}/><span style={S.postAuthorName}>{p.author}</span><RoleBadge role={p.authorRole}/>{p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}<span style={S.postTime}>{timeAgo(p.createdAt)}</span></div><div style={S.postTitle}>{p.title}</div><div style={{...S.postBody,...(!isExpanded?{maxHeight:80,overflow:'hidden',WebkitMaskImage:postComments.length>0||p.body.length>200?'linear-gradient(to bottom, black 60%, transparent 100%)':undefined}:{})}}>{p.body}</div><div style={S.postFooter}><span style={{...S.postStat,...(isExpanded?{color:'var(--accent-text)',background:'var(--accent-bg)'}:{})}}>💬 {postComments.length} comentario{postComments.length===1?'':'s'}</span>{isAdmin && <span style={S.postStat} onClick={(e)=>{e.stopPropagation();onDeletePost(p.id);}}>🗑</span>}</div></div>{isExpanded && (<div style={{background:'var(--bg-raised)',border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--radius-lg) var(--radius-lg)',padding:'14px 18px'}} className="fade-in">{postComments.length > 0 && (<div style={S.commentWrap}>{postComments.map(c=>(<div key={c.id} style={S.commentCard}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><Avatar name={c.author} size={24}/><span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{c.author}</span><RoleBadge role={c.authorRole} style={{fontSize:7,padding:'1px 5px'}}/><span style={{fontSize:10,color:'var(--text-faint)',marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace"}}>{timeAgo(c.createdAt)}</span>{(isAdmin || c.author === user?.name) && (<button onClick={()=>onDeleteComment(p.id, c.id)} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:12,padding:0}}>×</button>)}</div><div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.55,whiteSpace:'pre-wrap',paddingLeft:32}}>{c.text}</div></div>))}</div>)}<div style={{display:'flex',gap:8,marginTop:10,alignItems:'flex-end'}}><Avatar name={user?.name} size={28} style={{flexShrink:0,marginBottom:2}}/><textarea style={{...S.commentInput,marginBottom:0,flex:1}} value={commentText} onChange={e=>setCommentText(e.target.value)} placeholder="Escribe un comentario..." rows={2} onKeyDown={e=>{if(e.key==='Enter'&&e.metaKey){submitComment(p.id);}}}/><button style={{...S.primaryBtn,padding:'8px 14px',flexShrink:0}} onClick={()=>submitComment(p.id)}>Enviar</button></div></div>)}</div>);})}</div>);
}
function MarketplaceView({listings, user, onNew, onDelete}) {
  const isAdmin = user?.role === 'admin';
  const canPost = user?.role === 'admin' || user?.role === 'member';
  const active = (listings||[]).filter(l=>l.active).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const [filter, setFilter] = useState('all');
  const filtered = filter === 'all' ? active : active.filter(l=>l.type===filter);
  return (<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}><button style={{...S.ghostBtn,...(filter==='all'?{background:'var(--accent-bg)',borderColor:'var(--accent)',color:'var(--accent-text)'}:{})}} onClick={()=>setFilter('all')}>Todos</button>{MARKETPLACE_TYPES.map(t=>(<button key={t.id} style={{...S.ghostBtn,...(filter===t.id?{background:'var(--accent-bg)',borderColor:'var(--accent)',color:'var(--accent-text)'}:{})}} onClick={()=>setFilter(t.id)}>{t.label.split(' ')[0]}</button>))}</div>{canPost && <button style={S.primaryBtn} onClick={onNew}>+ Publicar</button>}</div>{filtered.length===0?<div style={S.empty}><span style={S.emptyIcon}>🛒</span><span style={S.emptyText}>{filter==='all'?'Sin publicaciones':'Sin resultados'}</span></div>:filtered.map(l=>{const t = MARKETPLACE_TYPES.find(mt=>mt.id===l.type); return (<div key={l.id} style={S.mkCard}><div style={{...S.mkTypeBar,background:t?.color||'var(--accent)'}}/><div style={S.mkBody}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span style={{...S.headerBadge,color:t?.color,borderColor:t?.color,background:t?.color+'15',fontSize:8,padding:'3px 8px'}}>{t?.label}</span><span style={{marginLeft:'auto',...S.postTime}}>{timeAgo(l.createdAt)}</span></div><div style={{fontSize:16,fontWeight:700,color:'var(--text)',fontFamily:"'Outfit',sans-serif",marginBottom:6}}>{l.title}</div><div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.6,whiteSpace:'pre-wrap',marginBottom:10}}>{l.body}</div><div style={S.mkMeta}>{l.location && <span style={S.mkTag}>📍 {l.location}</span>}{l.price && <span style={{...S.mkTag,color:'var(--success)'}}>💰 {l.price}</span>}{l.contact && <span style={{...S.mkTag,color:'var(--accent-text)'}}>📱 {l.contact}</span>}</div><div style={{display:'flex',alignItems:'center',gap:8,marginTop:12,paddingTop:10,borderTop:'1px solid var(--border)'}}><Avatar name={l.author} size={22}/><span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{l.author}</span><RoleBadge role={l.authorRole} style={{fontSize:7,padding:'1px 5px'}}/>{(isAdmin || l.author === user?.name) && (<span style={{...S.postStat,marginLeft:'auto'}} onClick={()=>onDelete(l.id)}>🗑</span>)}</div></div></div>);})}{!canPost && (<div style={{textAlign:'center',padding:'20px',color:'var(--text-dim)',fontSize:12,border:'1px dashed var(--border)',borderRadius:'var(--radius)',marginTop:12}}>🔒 Solo miembros pueden publicar en el marketplace. <span style={{color:'var(--member)',cursor:'pointer'}}>Hazte miembro →</span></div>)}</div>);
}
function ResourceView({channel, posts, user, onNewPost, onDeletePost}) {
  const isAdmin = user?.role === 'admin';
  const sorted = [...(posts||[])].sort((a,b)=>{ if(a.pinned&&!b.pinned) return -1; if(!a.pinned&&b.pinned) return 1; return new Date(b.createdAt)-new Date(a.createdAt);});
  return (<div>{isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo recurso</button></div>}{sorted.length===0?<div style={S.empty}><span style={S.emptyIcon}>📚</span><span style={S.emptyText}>Sin recursos todavía</span></div>:sorted.map(p=>(<div key={p.id} style={{...S.postCard,...(p.pinned?S.postPinned:{}),cursor:'default'}}><div style={S.postAuthorRow}><Avatar name={p.author}/><span style={S.postAuthorName}>{p.author}</span><RoleBadge role={p.authorRole}/>{p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}<span style={S.postTime}>{timeAgo(p.createdAt)}</span></div><div style={S.postTitle}>{p.title}</div><div style={S.postBody}>{p.body}</div>{isAdmin && <div style={S.postFooter}><span style={S.postStat} onClick={()=>onDeletePost(p.id)}>🗑</span></div>}</div>))}</div>);
}
function LockedView({onUpgrade}) { return (<div style={S.lockedOverlay}><div style={S.lockIcon}>🔒</div><div style={S.lockTitle}>Contenido exclusivo para miembros</div><div style={S.lockDesc}>Esta sección es solo para miembros de la comunidad RAL. Obtené acceso a contenido técnico, cursos, descuentos y más.</div><button style={S.lockBtn} onClick={onUpgrade}>⭐ Hacete miembro</button></div>); }

// ═══════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function Sidebar({data, user, activeChannelId, onSelectChannel, onAddCategory, onAddChannel, onLogout, onToggleAdmin, onToggleMember}) {
  const [collapsed, setCollapsed] = useState({});
  const sortedCats = useMemo(()=>[...data.categories].sort((a,b)=>(a.order??999)-(b.order??999)),[data.categories]);
  const isAdmin = user?.role === 'admin';
  return (<div style={S.sidebar}><div style={S.brand}><div style={S.brandLogo}><div style={{position:'absolute',inset:0,borderRadius:12,padding:2,background:'var(--rainbow)',backgroundSize:'200% 200%',animation:'rainbowBorder 4s ease infinite'}}/><div style={S.brandLogoInner}><span style={{fontSize:11,fontWeight:900,fontFamily:"'Outfit',sans-serif"}}>RAL</span></div></div><div style={S.brandText}><div style={S.brandTitle}>Rope Access Latino</div><div style={S.brandSub}>Community</div></div></div><div style={S.onlineBar}><span style={S.onlineDot}/><span style={S.onlineText}>42 online</span></div><div style={S.catList}>{isAdmin && (<div style={{padding:'6px 4px 10px',display:'flex',gap:4}}><button style={{...S.ghostBtn,flex:1,justifyContent:'center',fontSize:10}} onClick={onAddCategory}>+ Categoría</button></div>)}{sortedCats.map(cat=>{const catChannels = data.channels.filter(c=>c.categoryId===cat.id); const isPrivate = cat.visibility === 'private'; const isOpen = !collapsed[cat.id]; const canView = !isPrivate || isAdmin || user?.role === 'member' || user?.testPassed === true; return (<div key={cat.id} style={S.catWrap}><div style={S.catHeader} onClick={()=>setCollapsed(prev=>({...prev,[cat.id]:!prev[cat.id]}))}><span style={{...S.catCaret,transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span><span style={S.catEmoji}>{cat.emoji}</span><span style={S.catName}>{cat.name}</span>{isPrivate && <span style={S.catPrivateBadge}>🔒</span>}{isAdmin && <button style={S.catAddBtn} onClick={e=>{e.stopPropagation();onAddChannel(cat.id);}}>+</button>}</div>{isOpen && canView && catChannels.map(ch=>{const isActive = activeChannelId === ch.id; return (<div key={ch.id} style={{...S.chItem,...(isActive?S.chItemActive:{})}} onClick={()=>onSelectChannel(ch.id)} onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background='var(--bg-hover)';}} onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}><span>{ch.name}</span></div>);})}{isOpen && !canView && (<div style={{padding:'6px 22px',fontSize:11,color:'var(--text-faint)',fontStyle:'italic'}}>🔒 Solo miembros / aprobados</div>)}</div>);})}</div><div style={S.userBar}><Avatar name={user?.name} size={34}/><div style={{flex:1,minWidth:0}}><div style={S.userName}>{user?.name}</div><div style={{display:'flex',gap:4,marginTop:3}}><RoleBadge role={user?.role} style={{fontSize:7,padding:'1px 5px'}}/>{user?.level && <span style={{fontSize:8,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace"}}>{user.level}</span>}{user?.testPassed && <span style={{fontSize:8,color:'var(--success)'}}>✓ test</span>}</div></div><div style={{display:'flex',flexDirection:'column',gap:3}}><button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px',fontFamily:"'JetBrains Mono',monospace"}} onClick={onToggleAdmin} title="Toggle admin role">{user?.role==='admin'?'👑':'🔧'}</button><button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px',fontFamily:"'JetBrains Mono',monospace"}} onClick={onToggleMember} title="Toggle member role">⭐</button><button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px'}} onClick={onLogout} title="Logout">🚪</button></div></div></div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(()=>DB.getUser());
  const [data, setData] = useState(()=>DB.getData());
  const [posts, setPosts] = useState(()=>DB.getPosts());
  const [comments, setComments] = useState(()=>DB.getComments());
  const [marketplace, setMarketplace] = useState(()=>DB.getMarketplace());
  const [activeChannelId, setActiveChannelId] = useState(null);
  const [showCatModal, setShowCatModal] = useState(null);
  const [showChModal, setShowChModal] = useState(null);
  const [showPostModal, setShowPostModal] = useState(false);
  const [showMkModal, setShowMkModal] = useState(false);
  const [showTestModal, setShowTestModal] = useState(false);

  useEffect(()=>{if(!data){const d=seedData();setData(d);DB.setData(d);}}, []);
  useEffect(()=>{if(Object.keys(posts).length===0&&data){const p=seedPosts();setPosts(p);DB.setPosts(p);}}, [data]);
  useEffect(()=>{if(Object.keys(comments).length===0&&data){const c=seedComments();setComments(c);DB.setComments(c);}}, [data]);
  useEffect(()=>{if(marketplace.length===0&&data){const m=seedMarketplace();setMarketplace(m);DB.setMarketplace(m);}}, [data]);
  useEffect(()=>{if(user)DB.setUser(user);},[user]);
  useEffect(()=>{if(data)DB.setData(data);},[data]);
  useEffect(()=>{DB.setPosts(posts);},[posts]);
  useEffect(()=>{DB.setComments(comments);},[comments]);
  useEffect(()=>{DB.setMarketplace(marketplace);},[marketplace]);

  const handleLogin = (u) => { setUser(u); };
  const handleLogout = () => { setUser(null); DB.setUser(null); };
  const handleTestPass = () => { setUser(prev => ({ ...prev, testPassed: true, role: prev.role === 'guest' ? 'member' : prev.role })); };
  if(!user) return <LoginScreen onLogin={handleLogin}/>;
  if(!data) return null;

  const channel = data.channels.find(c=>c.id===activeChannelId);
  const channelCategory = channel ? data.categories.find(cat=>cat.id===channel.categoryId) : null;
  const isPrivateChannel = channelCategory?.visibility === 'private';
  const canViewChannel = !isPrivateChannel || user.role === 'admin' || user.role === 'member' || user.testPassed === true;
  const isAdmin = user.role === 'admin';

  const saveCategory = (cat) => { setData(prev=>{ const idx = prev.categories.findIndex(c=>c.id===cat.id); if(idx>=0){const cats=[...prev.categories];cats[idx]=cat;return{...prev,categories:cats};} return {...prev, categories:[...prev.categories, {...cat,order:prev.categories.length}]}; }); };
  const saveChannel = (ch) => { setData(prev=>{ const idx = prev.channels.findIndex(c=>c.id===ch.id); if(idx>=0){const chs=[...prev.channels];chs[idx]=ch;return{...prev,channels:chs};} return {...prev, channels:[...prev.channels, ch]}; }); setActiveChannelId(ch.id); };
  const deleteChannel = (id) => { if(!confirm('¿Eliminar este canal?')) return; setData(prev=>({...prev,channels:prev.channels.filter(c=>c.id!==id)})); if(activeChannelId===id) setActiveChannelId(null); };
  const createPost = (channelId, {title,body,pinned}) => { const post = {id:'p-'+uid(),title,body,pinned,author:user.name,authorRole:user.role,createdAt:new Date().toISOString()}; setPosts(prev=>({...prev,[channelId]:[post,...(prev[channelId]||[])]})); };
  const deletePost = (channelId, postId) => { if(!confirm('¿Eliminar?')) return; setPosts(prev=>({...prev,[channelId]:(prev[channelId]||[]).filter(p=>p.id!==postId)})); setComments(prev=>{const n={...prev};delete n[postId];return n;}); };
  const addComment = (postId, text) => { const c = {id:'c-'+uid(),text,author:user.name,authorRole:user.role,createdAt:new Date().toISOString()}; setComments(prev=>({...prev,[postId]:[...(prev[postId]||[]),c]})); };
  const deleteComment = (postId, commentId) => { setComments(prev=>({...prev,[postId]:(prev[postId]||[]).filter(c=>c.id!==commentId)})); };
  const createListing = ({type,title,body,location,contact,price}) => { const l = {id:'mk-'+uid(),type,title,body,location,contact,price,author:user.name,authorRole:user.role,createdAt:new Date().toISOString(),active:true}; setMarketplace(prev=>[l,...prev]); };
  const deleteListing = (id) => { if(!confirm('¿Eliminar publicación?')) return; setMarketplace(prev=>prev.filter(l=>l.id!==id)); };
  const toggleRole = (targetRole) => { setUser(prev => ({...prev, role: prev.role === targetRole ? 'guest' : targetRole})); };
  const channelTypeInfo = channel ? CHANNEL_TYPES[channel.type] : null;

  const WelcomeScreen = () => (<div style={{...S.empty, height: '100%', padding: '24px'}}><div style={{textAlign: 'center', marginBottom: 24}}><div style={{width: 120, height: 120, margin: '0 auto 24px', position: 'relative', borderRadius: 24, background: 'var(--bg-deep)'}}><div style={{position: 'absolute', inset: -2, borderRadius: 26, background: 'var(--rainbow)', backgroundSize: '200% 200%', animation: 'rainbowBorder 4s ease infinite'}}/><div style={{position: 'absolute', inset: 4, borderRadius: 20, background: 'var(--bg-deep)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column'}}><span style={{fontSize: 36, fontWeight: 900, fontFamily: "'Outfit', sans-serif", background: 'var(--rainbow)', WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent', backgroundSize: '200% 200%', animation: 'rainbowBorder 4s ease infinite'}}>RAL</span><span style={{fontSize: 9, fontWeight: 600, color: 'var(--text-dim)', marginTop: 4}}>Rope Access Latino</span></div></div><div style={{fontSize: 26, fontWeight: 800, color: 'var(--text)', fontFamily: "'Outfit', sans-serif", marginBottom: 8}}>Bienvenido a RAL</div><div style={{fontSize: 14, color: 'var(--text-muted)', maxWidth: 400, margin: '0 auto', lineHeight: 1.5}}>La comunidad latina de rope access</div></div>{!user.testPassed ? (<div style={{background: 'var(--bg-panel)', borderRadius: 'var(--radius-xl)', padding: '28px 24px', maxWidth: 480, margin: '0 auto', border: '1px solid var(--border)'}}><div style={{fontSize: 20, fontWeight: 700, marginBottom: 8}}>🧗 ¿Quieres volverte rope access?</div><div style={{fontSize: 13, color: 'var(--text-muted)', marginBottom: 20}}>Hacé nuestro test gratuito basado en la experiencia real de técnicos IRATA. Descubrí si tu perfil se adapta al curso y obtené acceso a secciones exclusivas.</div><button style={{...S.primaryBtn, width: '100%', padding: '12px', fontSize: 14}} onClick={() => setShowTestModal(true)}>📝 Comenzar test gratuito</button></div>) : (<div style={{background: 'var(--success-bg)', border: '1px solid var(--success)', borderRadius: 'var(--radius-xl)', padding: '20px 24px', maxWidth: 480, margin: '0 auto', textAlign: 'center'}}><div style={{fontSize: 32}}>✅</div><div style={{fontSize: 18, fontWeight: 700, marginTop: 8}}>¡Test aprobado!</div><div style={{fontSize: 13, marginTop: 8}}>Ya tenés acceso a las secciones privadas (Formación, Técnico). Explorá el menú lateral.</div></div>)}</div>);

  return (<div style={S.app}><Sidebar data={data} user={user} activeChannelId={activeChannelId} onSelectChannel={setActiveChannelId} onAddCategory={()=>setShowCatModal({editing:null})} onAddChannel={(catId)=>setShowChModal({categoryId:catId})} onLogout={handleLogout} onToggleAdmin={()=>toggleRole('admin')} onToggleMember={()=>toggleRole('member')}/><div style={S.main}>{!channel ? <WelcomeScreen /> : !canViewChannel ? <LockedView onUpgrade={() => setShowTestModal(true)}/> : (<><div style={S.header}><div style={S.headerInfo}><div style={S.headerTitle}>{channel.name}</div><div style={S.headerDesc}>{channelTypeInfo?.desc || 'Canal'}{channelCategory && ` · ${channelCategory.emoji} ${channelCategory.name}`}</div></div><div style={{display:'flex',gap:6,alignItems:'center'}}>{isPrivateChannel && <span style={{...S.headerBadge,color:'var(--member)',borderColor:'var(--member)',background:'var(--member-bg)'}}>🔒 Miembros</span>}{isAdmin && <button style={{...S.ghostBtn,fontSize:10}} onClick={()=>deleteChannel(channel.id)}>🗑</button>}</div></div><div style={S.content}>{channel.type === 'announcement' && <AnnouncementView channel={channel} posts={posts[channel.id]||[]} user={user} onNewPost={()=>setShowPostModal(true)} onDeletePost={(pid)=>deletePost(channel.id,pid)}/>}{channel.type === 'discussion' && <DiscussionView channel={channel} posts={posts[channel.id]||[]} comments={comments} user={user} onNewPost={()=>setShowPostModal(true)} onDeletePost={(pid)=>deletePost(channel.id,pid)} onAddComment={addComment} onDeleteComment={deleteComment}/>}{channel.type === 'marketplace' && <MarketplaceView listings={marketplace} user={user} onNew={()=>setShowMkModal(true)} onDelete={deleteListing}/>}{channel.type === 'resource' && <ResourceView channel={channel} posts={posts[channel.id]||[]} user={user} onNewPost={()=>setShowPostModal(true)} onDeletePost={(pid)=>deletePost(channel.id,pid)}/>}</div></>)}</div>{showCatModal && <CategoryModal onClose={()=>setShowCatModal(null)} onSave={saveCategory} editing={showCatModal.editing}/>}{showChModal && <ChannelModal onClose={()=>setShowChModal(null)} onSave={saveChannel} categoryId={showChModal.categoryId}/>}{showPostModal && channel && <PostModal onClose={()=>setShowPostModal(false)} onSave={(p)=>createPost(channel.id,p)} channelName={channel.name}/>}{showMkModal && <MarketplaceModal onClose={()=>setShowMkModal(false)} onSave={createListing} user={user}/>}{showTestModal && <TestModal onClose={()=>setShowTestModal(false)} onPass={handleTestPass} />}</div>);
}

// Nota: CategoryModal, ChannelModal, PostModal, MarketplaceModal no se modificaron; existen en el código original pero no están mostrados aquí por brevedad.
// Para que el código funcione completamente, necesitas incluir esos componentes (se omiten por espacio, pero están en tu código original).
// Si necesitas que los incluya, házmelo saber.

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
