function timeAgo(iso) {
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'ahora';
  if(diff < 3600) return Math.floor(diff/60) + 'm';
  if(diff < 86400) return Math.floor(diff/3600) + 'h';
  if(diff < 604800) return Math.floor(diff/86400) + 'd';
  return new Date(iso).toLocaleDateString('es', {day:'numeric',month:'short'});
}

// AVATAR & ROLE BADGE
// ═══════════════════════════════════════════════════════════════════════════
function getAvatarColor(name) {
  const colors = ['#e74c3c','#2ecc40','#f1c40f','#6cb4ee','#e84393','#22d3ee','#a78bfa','#f97316','#14b8a6','#8b5cf6'];
  let h = 0; for(let i=0;i<(name||'').length;i++) h = ((h<<5)-h)+name.charCodeAt(i);
  return colors[Math.abs(h) % colors.length];
}
function Avatar({name,size=30,style:extra}) {
  const c = getAvatarColor(name);
  return <div style={{...S.postAvatar,width:size,height:size,background:c+'22',color:c,fontSize:Math.round(size*0.43),...extra}}>
    {(name||'?').charAt(0).toUpperCase()}
  </div>;
}
function RoleBadge({role,style:extra}) {
  const bg = role==='admin'?'var(--danger-bg)':role==='member'?'var(--member-bg)':'var(--bg-raised)';
  const color = ROLE_COLORS[role]||'var(--text-dim)';
  return <span style={{...S.postAuthorRole,background:bg,color,...extra}}>{ROLES[role]||role}</span>;
}

// ═══════════════════════════════════════════════════════════════════════════
// APTITUDE TEST — internal scoring + layered recommendations
// ═══════════════════════════════════════════════════════════════════════════
//
// SCORING SYSTEM (internal, hidden from user):
//
//   AGE:
//     18-25 → 5 pts
//     25-30 → 10 pts
//     30-35 → 7 pts
//     35-40 → 2 pts
//     >40   → HARD BLOCK (not recommended)
//
//   VISA:
//     Tourist      → HARD BLOCK for sponsorship path (but can still pass test)
//     Student      → HARD BLOCK for sponsorship path
//     WH <3 months → HARD BLOCK for sponsorship path
//     WH 3-6 months → 4 pts
//     WH >6 months → 10 pts
//     Resident/Citizen → 12 pts
//
//   TRADE EXPERIENCE:
//     None   → -5 pts
//     Some   → 0 pts
//     5+ yrs → 10 pts
//
//   CLIMBING:
//     Never   → 0 pts
//     Few times → 4 pts
//     Regular/sport → 8 pts
//     Professional → 12 pts
//
//   FITNESS:
//     Low → -5 pts
//     Medium → 5 pts
//     High → 12 pts
//
//   ENGLISH:
//     Basic/low → 0 pts (but always triggers Preply recommendation)
//     Intermediate → 6 pts
//     Advanced → 12 pts
//
//   TEAMWORK:
//     Prefers alone → 0 pts
//     OK/regular → 4 pts
//     Very good → 8 pts
//
//   PASS THRESHOLD: 30 pts AND no HARD_BLOCK flags
//   CONDITIONAL PASS (would qualify for L1 but NO sponsor path): score >= 30 but has HARD_BLOCK
//
const TEST_QUESTIONS = [
  {
    id:'age', emoji:'🎂', text:'¿Cuántos años tenés?',
    options:[
      {label:'18 – 25 años', value:'18-25', points:5},
      {label:'25 – 30 años', value:'25-30', points:10},
      {label:'30 – 35 años', value:'30-35', points:7},
      {label:'35 – 40 años', value:'35-40', points:2},
      {label:'Más de 40 años', value:'40+', points:0, hardBlock:'age'},
    ],
  },
  {
    id:'visa', emoji:'🛂', text:'Tu situación migratoria actual (si aplica a NZ)',
    options:[
      {label:'Visa de Turista', value:'tourist', points:0, hardBlock:'visa_tourist'},
      {label:'Visa de Estudiante', value:'student', points:0, hardBlock:'visa_student'},
      {label:'Working Holiday — menos de 3 meses', value:'wh-lt3', points:0, hardBlock:'wh_short'},
      {label:'Working Holiday — entre 3 y 6 meses', value:'wh-3-6', points:4},
      {label:'Working Holiday — más de 6 meses', value:'wh-gt6', points:10},
      {label:'Residente / Ciudadano / otra con derecho a trabajar', value:'resident', points:12},
    ],
  },
  {
    id:'trade', emoji:'🔧', text:'Experiencia en oficios (carpintero, pintor, albañil, etc.)',
    options:[
      {label:'No tengo oficio', value:'none', points:-5},
      {label:'Algo de experiencia (poca, eventuales)', value:'some', points:0},
      {label:'Más de 5 años en un oficio', value:'pro', points:10},
    ],
  },
  {
    id:'climb', emoji:'🧗', text:'Experiencia en escalada o trabajos en altura',
    options:[
      {label:'Ninguna', value:'none', points:0},
      {label:'Escalé algunas veces (gimnasio o outdoor)', value:'few', points:4},
      {label:'Escalada regular o deportiva', value:'regular', points:8},
      {label:'Profesional / escalador experimentado', value:'pro', points:12},
    ],
  },
  {
    id:'fitness', emoji:'💪', text:'Condición física actual',
    options:[
      {label:'Baja (sedentario, poca actividad)', value:'low', points:-5},
      {label:'Media (actividad ocasional)', value:'medium', points:5},
      {label:'Alta (entreno 3+ veces por semana)', value:'high', points:12},
    ],
  },
  {
    id:'english', emoji:'📘', text:'Nivel de inglés',
    options:[
      {label:'Bajo / básico', value:'low', points:0},
      {label:'Intermedio (me manejo en conversación)', value:'medium', points:6},
      {label:'Avanzado / profesional / nativo', value:'high', points:12},
    ],
  },
  {
    id:'teamwork', emoji:'🤝', text:'¿Cómo te llevás trabajando en equipo?',
    options:[
      {label:'Prefiero trabajar solo', value:'alone', points:0},
      {label:'Lo necesario, sin problema', value:'ok', points:4},
      {label:'Me gusta mucho, comunico bien, colaboro', value:'great', points:8},
    ],
  },
];

const PASS_THRESHOLD = 30;

function evaluateTest(answers) {
  // Build lookup
  const picks = {};
  const hardBlocks = [];
  let total = 0;
  TEST_QUESTIONS.forEach(q => {
    const val = answers[q.id];
    const opt = q.options.find(o => o.value === val);
    if (opt) {
      picks[q.id] = opt;
      total += opt.points;
      if (opt.hardBlock) hardBlocks.push(opt.hardBlock);
    }
  });

  // Extra synthetic block: over 40 + low fitness = hard block
  const ageValue = picks.age?.value;
  const fitnessValue = picks.fitness?.value;
  if (ageValue === '40+' && fitnessValue === 'low') {
    hardBlocks.push('age_fitness');
  }

  // Classify outcome
  const meetsThreshold = total >= PASS_THRESHOLD;
  const hasBlock = hardBlocks.length > 0;

  let outcome;
  if (meetsThreshold && !hasBlock) {
    outcome = 'pass'; // full pass, good for sponsorship path
  } else if (meetsThreshold && hasBlock) {
    outcome = 'pass_conditional'; // could do L1 but no sponsor path realistically
  } else {
    outcome = 'fail'; // below threshold
  }

  // Build recommendations (layered)
  const recs = [];

  // Visa-specific (only if block)
  if (hardBlocks.includes('visa_tourist')) {
    recs.push({
      level:'danger',
      icon:'⚠️',
      text:'**Visa de turista:** no se recomienda invertir en IRATA si tu meta es conseguir sponsor. Las chances son extremadamente bajas. Podrías certificarte por experiencia personal, pero no esperes sponsor con este estatus.'
    });
  }
  if (hardBlocks.includes('visa_student')) {
    recs.push({
      level:'danger',
      icon:'🎓',
      text:'**Visa de estudiante:** podés hacer el curso, pero con permisos de trabajo restringidos será muy difícil conseguir sponsor. Usá este tiempo para mejorar inglés y condición física.'
    });
  }
  if (hardBlocks.includes('wh_short')) {
    recs.push({
      level:'danger',
      icon:'⏳',
      text:'**WH con menos de 3 meses:** casi imposible conseguir sponsor en ese plazo. Las empresas necesitan probarte varios meses antes de considerar sponsor. Mejor extender la visa antes de invertir en IRATA.'
    });
  }

  // Age blocks
  if (hardBlocks.includes('age')) {
    recs.push({
      level:'danger',
      icon:'🎂',
      text:'**Más de 40 años:** no recomendado. El rope access es una industria muy pesada para el cuerpo. Para llegar a un rol de supervisor (donde baja la carga física) se necesitan al menos 4 años — incluso teniendo oficios como pintura. Con este punto de partida, la industria exige más de lo que suele ser sostenible a largo plazo.'
    });
  }
  if (hardBlocks.includes('age_fitness')) {
    recs.push({
      level:'danger',
      icon:'💪',
      text:'**Edad +40 con condición física baja:** combinación muy complicada para esta industria. Antes de pensar en rope access, te recomendamos construir una base física sólida (al menos 6 meses de entrenamiento regular).'
    });
  }

  // English (always show recommendation if low, regardless of pass/fail)
  if (picks.english?.value === 'low') {
    recs.push({
      level:'info',
      icon:'📘',
      text:`**Mejorar tu inglés es clave.** Hacé el test gratuito de Preply para saber tu nivel real: [${PREPLY_TEST_URL}](${PREPLY_TEST_URL}). Si querés clases, hay buenos tutores desde **10 NZD/hora** — uso Preply hace 2 años, lo recomiendo mucho: [${PREPLY_REFERRAL_URL}](${PREPLY_REFERRAL_URL}).`
    });
  }

  // Fitness
  if (picks.fitness?.value === 'low') {
    recs.push({
      level:'warn',
      icon:'🏋️',
      text:'**Condición física baja.** Entrenamiento recomendado: 3 veces por semana, 40 minutos. Core: sentadillas, flexiones y plancha (plank). Esas 3 cosas son fundamentales para trabajar en altura.'
    });
  } else if (picks.fitness?.value === 'medium') {
    recs.push({
      level:'info',
      icon:'⚡',
      text:'**Condición física media:** ideal llegar a nivel alto. Incorporá plancha y sentadillas 3 veces/semana para fortalecer el core.'
    });
  }

  // Trade experience
  if (picks.trade?.value === 'none') {
    recs.push({
      level:'info',
      icon:'🏗️',
      text:'**Sin experiencia en oficios:** antes de invertir en IRATA, te sugerimos trabajar unos meses en construcción. Vas a aprender la cultura laboral, seguridad y la exigencia física. Es un gran punto de partida.'
    });
  }

  // Climbing
  if (picks.climb?.value === 'none' && picks.fitness?.value !== 'high') {
    recs.push({
      level:'info',
      icon:'🧗',
      text:'**Nunca escalaste:** probá unas sesiones en un gimnasio de escalada antes del curso. Te va a dar referencia de cómo se siente estar suspendido y trabajar con arnés.'
    });
  }

  // Teamwork
  if (picks.teamwork?.value === 'alone') {
    recs.push({
      level:'warn',
      icon:'🤝',
      text:'**Trabajar solo:** el rope access se trabaja en equipos. Los primeros años dependés de tu compañero para seguridad, backup y procedimientos. Si preferís trabajar solo, esta industria probablemente no sea para vos.'
    });
  }

  // Season / construction note always shown
  recs.push({
    level:'info',
    icon:'📅',
    text:'**Temporada alta NZ: septiembre a junio.** El otoño/invierno es ideal para certificarte. Si no tenés experiencia en oficios, aprovechá esa época para trabajar en construcción y aplicar paralelamente a rope access.'
  });

  return { total, outcome, recs, picks, hardBlocks };
}

function TestModal({ onClose, onPass }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [shuffled, setShuffled] = useState({});

  // Shuffle options on mount (so no obvious right answer pattern)
  useEffect(() => {
    const s = {};
    TEST_QUESTIONS.forEach(q => {
      // Keep age & visa in logical order — only shuffle experience / skill questions
      if (['age','visa','english','fitness'].includes(q.id)) {
        s[q.id] = q.options;
      } else {
        const copy = [...q.options];
        for (let i=copy.length-1; i>0; i--) {
          const j = Math.floor(Math.random()*(i+1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        s[q.id] = copy;
      }
    });
    setShuffled(s);
  }, []);

  const pickAnswer = (qId, value) => setAnswers(prev => ({...prev, [qId]: value}));
  const allAnswered = TEST_QUESTIONS.every(q => answers[q.id] !== undefined);
  const answeredCount = Object.keys(answers).length;
  const progress = (answeredCount / TEST_QUESTIONS.length) * 100;

  const submit = () => {
    const r = evaluateTest(answers);
    setResult(r);
    setSubmitted(true);
    // ANY pass (full or conditional) unlocks community private sections — they completed the test
    if (r.outcome === 'pass' || r.outcome === 'pass_conditional') {
      onPass();
    }
  };

  const reset = () => {
    setAnswers({});
    setSubmitted(false);
    setResult(null);
  };

  // Render inline markdown-style links + bold within recommendations
  const renderRec = (text) => {
    // Handle [label](url) -> anchor
    const parts = [];
    let remaining = text;
    let key = 0;
    const linkRegex = /\[([^\]]+)\]\(([^)]+)\)/;
    while (remaining.length) {
      const m = remaining.match(linkRegex);
      if (!m) { parts.push(remaining); break; }
      const before = remaining.slice(0, m.index);
      parts.push(before);
      parts.push(<a key={'a'+key++} href={m[2]} target="_blank" rel="noopener" style={S.miniLink}>{m[1]}</a>);
      remaining = remaining.slice(m.index + m[0].length);
    }
    // Now handle **bold** on string parts
    const withBold = [];
    parts.forEach((p, i) => {
      if (typeof p !== 'string') { withBold.push(p); return; }
      const segs = p.split(/(\*\*[^*]+\*\*)/g);
      segs.forEach((seg, j) => {
        if (seg.startsWith('**') && seg.endsWith('**')) {
          withBold.push(<strong key={'b'+i+'-'+j} style={{color:'var(--text)'}}>{seg.slice(2,-2)}</strong>);
        } else if (seg) {
          withBold.push(<span key={'s'+i+'-'+j}>{seg}</span>);
        }
      });
    });
    return <>{withBold}</>;
  };

  const recStyle = (level) => {
    if (level === 'danger') return {background:'var(--danger-bg)', borderLeft:'3px solid var(--danger)', color:'#fca5a5'};
    if (level === 'warn')   return {background:'var(--warn-bg)',   borderLeft:'3px solid var(--warn)',   color:'#fde68a'};
    return                        {background:'var(--bg-raised)',  borderLeft:'3px solid var(--accent)', color:'var(--text-muted)'};
  };

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={{...S.modal, maxWidth: 680}} onClick={e=>e.stopPropagation()} className="fade-in">
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalKicker}>🧗 Test de aptitud · Rope Access</div>
            <div style={S.modalTitle}>¿Me conviene hacer el curso?</div>
          </div>
          <button style={S.closeBtn} onClick={onClose}>×</button>
        </div>

        <div style={S.modalBody}>
          {!submitted ? (
            <>
              {/* Progress bar */}
              <div style={{background:'var(--border)', height:5, borderRadius:3, marginBottom:18, overflow:'hidden'}}>
                <div style={{width:`${progress}%`, background:'var(--accent)', height:5, borderRadius:3, transition:'width 0.2s'}}/>
              </div>
              <div style={{marginBottom:18, fontSize:11, color:'var(--text-dim)', textAlign:'center'}}>
                🎲 Las opciones se mezclan — respondé honestamente, sin buscar la "correcta"
              </div>

              {TEST_QUESTIONS.map(q => {
                const opts = shuffled[q.id] || q.options;
                return (
                  <div key={q.id} style={S.testSection}>
                    <div style={S.testSectionTitle}>
                      <span style={{fontSize:16}}>{q.emoji}</span>
                      <span>{q.text}</span>
                    </div>
                    <div style={S.testChipsWrap}>
                      {opts.map(opt => {
                        const isSelected = answers[q.id] === opt.value;
                        return (
                          <div
                            key={opt.value}
                            style={{...S.testChip, ...(isSelected ? S.testChipSelected : {})}}
                            onClick={() => pickAnswer(q.id, opt.value)}>
                            {isSelected && <span>✓</span>}
                            <span>{opt.label}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}

              <button
                style={{...S.primaryBtn, width:'100%', padding:'14px', fontSize:13, marginTop:4, opacity: allAnswered ? 1 : 0.4, cursor: allAnswered ? 'pointer' : 'not-allowed'}}
                disabled={!allAnswered}
                onClick={submit}>
                📋 Evaluar mi perfil
              </button>

              <div style={{fontSize:10, color:'var(--text-faint)', textAlign:'center', marginTop:14, fontFamily:"'JetBrains Mono',monospace", lineHeight:1.5}}>
                Test basado en la experiencia de Lionel Melo · IRATA L3 · NZ
              </div>
            </>
          ) : (
            <>
              {/* Result display */}
              <div style={S.resultBox}>
                <div style={{fontSize:48, marginBottom:8}}>
                  {result.outcome === 'pass' ? '🎉' : result.outcome === 'pass_conditional' ? '⚠️' : '📘'}
                </div>
                <div style={{
                  fontSize:18, fontWeight:700, marginBottom:6,
                  color: result.outcome === 'pass' ? 'var(--success)' : result.outcome === 'pass_conditional' ? 'var(--warn)' : 'var(--danger)'
                }}>
                  {result.outcome === 'pass' && '✅ Perfil recomendado'}
                  {result.outcome === 'pass_conditional' && '⚠️ Apto pero con reservas'}
                  {result.outcome === 'fail' && '📘 Todavía no es el momento'}
                </div>
                <div style={{fontSize:13, color:'var(--text-muted)', lineHeight:1.5, maxWidth:460, margin:'0 auto'}}>
                  {result.outcome === 'pass' && 'Tu perfil está alineado con las necesidades de la industria. Tenés buenas chances de conseguir trabajo y eventualmente un sponsor.'}
                  {result.outcome === 'pass_conditional' && 'Técnicamente podrías hacer el nivel 1, pero por tu situación actual las chances de sponsor son bajas. Leé las recomendaciones abajo con atención.'}
                  {result.outcome === 'fail' && 'Según tu perfil actual, todavía no es el mejor momento. Trabajá primero en los puntos marcados abajo y volvé a hacer el test más adelante.'}
                </div>
              </div>

              {/* Recommendations */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11, fontWeight:700, color:'var(--text-dim)', textTransform:'uppercase', letterSpacing:1, marginBottom:10, fontFamily:"'JetBrains Mono',monospace"}}>
                  Recomendaciones personalizadas
                </div>
                {result.recs.map((rec, i) => (
                  <div key={i} style={{...S.tip, ...recStyle(rec.level)}}>
                    <span style={S.tipIcon}>{rec.icon}</span>
                    <span style={{flex:1}}>{renderRec(rec.text)}</span>
                  </div>
                ))}
              </div>

              {/* Always-shown context info at bottom */}
              <div style={{...S.tip, background:'var(--bg-raised)', border:'1px solid var(--border)', borderLeft:'3px solid var(--member)', color:'var(--text-muted)', marginTop:16}}>
                <span style={S.tipIcon}>📌</span>
                <span style={{flex:1}}>
                  <strong style={{color:'var(--text)'}}>Importante:</strong> la certificación IRATA no te da derecho a trabajar — es un requisito técnico, no legal. Los primeros años es clave trabajar con una empresa para entender seguridad, inspección de equipos, permisos y procedimientos.
                </span>
              </div>

              {/* Action buttons */}
              <div style={{display:'flex', gap:8, marginTop:20}}>
                <button style={{...S.cancelBtn, flex:1, padding:'12px'}} onClick={reset}>
                  🔄 Rehacer test
                </button>
                {(result.outcome === 'pass' || result.outcome === 'pass_conditional') ? (
                  <button style={{...S.primaryBtn, flex:1, padding:'12px'}} onClick={onClose}>
                    🧗 Continuar →
                  </button>
                ) : (
                  <button style={{...S.cancelBtn, flex:1, padding:'12px'}} onClick={onClose}>
                    Cerrar
                  </button>
                )}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// CHANNEL VIEWS
// ═══════════════════════════════════════════════════════════════════════════
function AnnouncementView({channel, posts, user, onNewPost, onDeletePost}) {
  const isAdmin = user?.role === 'admin';
  const sorted = [...(posts||[])].sort((a,b)=>{ if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1; return new Date(b.createdAt)-new Date(a.createdAt);});
  return (<div>{isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo anuncio</button></div>}{sorted.length===0?<div style={S.empty}><span style={S.emptyIcon}>📢</span><span style={S.emptyText}>Sin anuncios todavía</span></div>:sorted.map(p=>(<div key={p.id} style={{...S.postCard,...(p.pinned?S.postPinned:{}),cursor:'default'}}><div style={S.postAuthorRow}><Avatar name={p.author}/><span style={S.postAuthorName}>{p.author}</span><RoleBadge role={p.authorRole}/>{p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}<span style={S.postTime}>{timeAgo(p.createdAt)}</span></div><div style={S.postTitle}>{p.title}</div><div style={S.postBody}>{p.body}</div>{isAdmin && (<div style={S.postFooter}><span style={S.postStat} onClick={()=>onDeletePost(p.id)}>🗑 Eliminar</span></div>)}</div>))}</div>);
}

function DiscussionView({channel, posts, comments, user, onNewPost, onDeletePost, onAddComment, onDeleteComment}) {
  const isAdmin = user?.role === 'admin';
  const [expandedPost, setExpandedPost] = useState(null);
  const [commentText, setCommentText] = useState('');
  const sorted = [...(posts||[])].sort((a,b)=>{ if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1; return new Date(b.createdAt)-new Date(a.createdAt);});
  const submitComment = (postId) => { if(!commentText.trim()) return; onAddComment(postId, commentText.trim()); setCommentText(''); };
  return (<div>{isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo tema</button></div>}{sorted.length===0?<div style={S.empty}><span style={S.emptyIcon}>💬</span><span style={S.emptyText}>Sin temas todavía</span></div>:sorted.map(p=>{const postComments = comments[p.id] || []; const isExpanded = expandedPost === p.id; return (<div key={p.id} style={{marginBottom:16,animation:'fadeIn 0.25s ease-out'}}><div style={{...S.postCard,...(p.pinned?S.postPinned:{}),marginBottom:0,borderRadius:isExpanded?'var(--radius-lg) var(--radius-lg) 0 0':'var(--radius-lg)'}} onClick={()=>setExpandedPost(isExpanded?null:p.id)}><div style={S.postAuthorRow}><Avatar name={p.author}/><span style={S.postAuthorName}>{p.author}</span><RoleBadge role={p.authorRole}/>{p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}<span style={S.postTime}>{timeAgo(p.createdAt)}</span></div><div style={S.postTitle}>{p.title}</div><div style={{...S.postBody,...(!isExpanded?{maxHeight:80,overflow:'hidden',WebkitMaskImage:postComments.length>0||p.body.length>200?'linear-gradient(to bottom, black 60%, transparent 100%)':undefined}:{})}}>{p.body}</div><div style={S.postFooter}><span style={{...S.postStat,...(isExpanded?{color:'var(--accent-text)',background:'var(--accent-bg)'}:{})}}>💬 {postComments.length} comentario{postComments.length===1?'':'s'}</span>{isAdmin && <span style={S.postStat} onClick={(e)=>{e.stopPropagation();onDeletePost(p.id);}}>🗑</span>}</div></div>{isExpanded && (<div style={{background:'var(--bg-raised)',border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--radius-lg) var(--radius-lg)',padding:'14px 18px'}} className="fade-in">{postComments.length > 0 && (<div style={S.commentWrap}>{postComments.map(c=>(<div key={c.id} style={S.commentCard}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><Avatar name={c.author} size={24}/><span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{c.author}</span><RoleBadge role={c.authorRole} style={{fontSize:7,padding:'1px 5px'}}/><span style={{fontSize:10,color:'var(--text-faint)',marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace"}}>{timeAgo(c.createdAt)}</span>{(isAdmin || c.author === user?.name) && (<button onClick={()=>onDeleteComment(p.id, c.id)} style={{background:'none',border:'none',color:'var(--text-faint)',cursor:'pointer',fontSize:12,padding:0}}>×</button>)}</div><div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.55,whiteSpace:'pre-wrap',paddingLeft:32}}>{c.text}</div></div>))}</div>)}<div style={{display:'flex',gap:8,marginTop:10,alignItems:'flex-end'}}><Avatar name={user?.name} size={28} style={{flexShrink:0,marginBottom:2}}/><textarea style={{...S.commentInput,marginBottom:0,flex:1}} value={commentText} onChange={e=>setCommentText(e.target.value)} placeholder="Escribe un comentario..." rows={2} onKeyDown={e=>{if(e.key==='Enter'&&e.metaKey){submitComment(p.id);}}}/><button style={{...S.primaryBtn,padding:'8px 14px',flexShrink:0}} onClick={()=>submitComment(p.id)}>Enviar</button></div></div>)}</div>);})}</div>);
}

function MarketplaceView({listings, user, onNew, onDelete}) {
  const isAdmin = user?.role === 'admin';
  const canPost = user?.role === 'admin' || user?.role === 'member';
  const active = (listings||[]).filter(l=>l.active).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const [filter, setFilter] = useState('all');
  const filtered = filter === 'all' ? active : active.filter(l=>l.type===filter);
  return (<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}><button style={{...S.ghostBtn,...(filter==='all'?{background:'var(--accent-bg)',borderColor:'var(--accent)',color:'var(--accent-text)'}:{})}} onClick={()=>setFilter('all')}>Todos</button>{MARKETPLACE_TYPES.map(t=>(<button key={t.id} style={{...S.ghostBtn,...(filter===t.id?{background:'var(--accent-bg)',borderColor:'var(--accent)',color:'var(--accent-text)'}:{})}} onClick={()=>setFilter(t.id)}>{t.label.split(' ')[0]}</button>))}</div>{canPost && <button style={S.primaryBtn} onClick={onNew}>+ Publicar</button>}</div>{filtered.length===0?<div style={S.empty}><span style={S.emptyIcon}>🛒</span><span style={S.emptyText}>{filter==='all'?'Sin publicaciones':'Sin resultados'}</span></div>:filtered.map(l=>{const t = MARKETPLACE_TYPES.find(mt=>mt.id===l.type); return (<div key={l.id} style={S.mkCard}><div style={{...S.mkTypeBar,background:t?.color||'var(--accent)'}}/><div style={S.mkBody}><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span style={{...S.headerBadge,color:t?.color,borderColor:t?.color,background:t?.color+'15',fontSize:8,padding:'3px 8px'}}>{t?.label}</span><span style={{marginLeft:'auto',...S.postTime}}>{timeAgo(l.createdAt)}</span></div><div style={{fontSize:16,fontWeight:700,color:'var(--text)',fontFamily:"'Outfit',sans-serif",marginBottom:6}}>{l.title}</div><div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.6,whiteSpace:'pre-wrap',marginBottom:10}}>{l.body}</div><div style={S.mkMeta}>{l.location && <span style={S.mkTag}>📍 {l.location}</span>}{l.price && <span style={{...S.mkTag,color:'var(--success)'}}>💰 {l.price}</span>}{l.contact && <span style={{...S.mkTag,color:'var(--accent-text)'}}>📱 {l.contact}</span>}</div><div style={{display:'flex',alignItems:'center',gap:8,marginTop:12,paddingTop:10,borderTop:'1px solid var(--border)'}}><Avatar name={l.author} size={22}/><span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{l.author}</span><RoleBadge role={l.authorRole} style={{fontSize:7,padding:'1px 5px'}}/>{(isAdmin || l.author === user?.name) && (<span style={{...S.postStat,marginLeft:'auto'}} onClick={()=>onDelete(l.id)}>🗑</span>)}</div></div></div>);})}{!canPost && (<div style={{textAlign:'center',padding:'20px',color:'var(--text-dim)',fontSize:12,border:'1px dashed var(--border)',borderRadius:'var(--radius)',marginTop:12}}>🔒 Solo miembros pueden publicar en el marketplace.</div>)}</div>);
}

function ResourceView({channel, posts, user, onNewPost, onDeletePost}) {
  const isAdmin = user?.role === 'admin';
  const sorted = [...(posts||[])].sort((a,b)=>{ if(a.pinned&&!b.pinned) return -1; if(!a.pinned&&b.pinned) return 1; return new Date(b.createdAt)-new Date(a.createdAt);});
  return (<div>{isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo recurso</button></div>}{sorted.length===0?<div style={S.empty}><span style={S.emptyIcon}>📚</span><span style={S.emptyText}>Sin recursos todavía</span></div>:sorted.map(p=>(<div key={p.id} style={{...S.postCard,...(p.pinned?S.postPinned:{}),cursor:'default'}}><div style={S.postAuthorRow}><Avatar name={p.author}/><span style={S.postAuthorName}>{p.author}</span><RoleBadge role={p.authorRole}/>{p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}<span style={S.postTime}>{timeAgo(p.createdAt)}</span></div><div style={S.postTitle}>{p.title}</div><div style={S.postBody}>{p.body}</div>{isAdmin && <div style={S.postFooter}><span style={S.postStat} onClick={()=>onDeletePost(p.id)}>🗑</span></div>}</div>))}</div>);
}

function LockedView({onUpgrade}) {
  return (<div style={S.lockedOverlay}><div style={S.lockIcon}>🔒</div><div style={S.lockTitle}>Contenido para miembros</div><div style={S.lockDesc}>Esta sección es solo para miembros de la comunidad RAL. Hacé el test gratuito de aptitud para acceder.</div><button style={S.lockBtn} onClick={onUpgrade}>📝 Hacer test gratuito</button></div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function Sidebar({data, user, activeChannelId, onSelectChannel, onLogout, onToggleAdmin, onToggleMember}) {
  const [collapsed, setCollapsed] = useState({});
  const sortedCats = useMemo(()=>[...data.categories].sort((a,b)=>(a.order??999)-(b.order??999)),[data.categories]);
  return (<div style={S.sidebar}><div style={S.brand}><div style={S.brandLogo}><div style={{position:'absolute',inset:0,borderRadius:12,padding:2,background:'var(--rainbow)',backgroundSize:'200% 200%',animation:'rainbowBorder 4s ease infinite'}}/><div style={S.brandLogoInner}><span style={{fontSize:11,fontWeight:900,fontFamily:"'Outfit',sans-serif"}}>RAL</span></div></div><div style={S.brandText}><div style={S.brandTitle}>Rope Access Latino</div><div style={S.brandSub}>Community</div></div></div><div style={S.onlineBar}><span style={S.onlineDot}/><span style={S.onlineText}>42 online</span></div><div style={S.catList}>{sortedCats.map(cat=>{const catChannels = data.channels.filter(c=>c.categoryId===cat.id); const isPrivate = cat.visibility === 'private'; const isOpen = !collapsed[cat.id]; const canView = !isPrivate || user.role === 'admin' || user.role === 'member' || user.testPassed === true; return (<div key={cat.id} style={S.catWrap}><div style={S.catHeader} onClick={()=>setCollapsed(prev=>({...prev,[cat.id]:!prev[cat.id]}))}><span style={{...S.catCaret,transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span><span style={S.catEmoji}>{cat.emoji}</span><span style={S.catName}>{cat.name}</span>{isPrivate && <span style={S.catPrivateBadge}>🔒</span>}</div>{isOpen && canView && catChannels.map(ch=>{const isActive = activeChannelId === ch.id; return (<div key={ch.id} style={{...S.chItem,...(isActive?S.chItemActive:{})}} onClick={()=>onSelectChannel(ch.id)} onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background='var(--bg-hover)';}} onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}><span>{ch.name}</span></div>);})}{isOpen && !canView && (<div style={{padding:'6px 22px',fontSize:11,color:'var(--text-faint)',fontStyle:'italic'}}>🔒 Hacé el test para desbloquear</div>)}</div>);})}</div><div style={S.userBar}><Avatar name={user?.name} size={34}/><div style={{flex:1,minWidth:0}}><div style={S.userName}>{user?.name}</div><div style={{display:'flex',gap:4,marginTop:3,alignItems:'center'}}><RoleBadge role={user?.role} style={{fontSize:7,padding:'1px 5px'}}/>{user?.level && <span style={{fontSize:8,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace"}}>{user.level}</span>}{user?.testPassed && <span style={{fontSize:8,color:'var(--success)'}} title="Test completado">✓</span>}</div></div><div style={{display:'flex',flexDirection:'column',gap:3}}><button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px'}} onClick={onToggleAdmin} title="Toggle admin role (demo)">{user?.role==='admin'?'👑':'🔧'}</button><button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px'}} onClick={onLogout} title="Logout">🚪</button></div></div></div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(()=>DB.getUser());
  const [data, setData] = useState(()=>DB.getData());
  const [posts, setPosts] = useState(()=>DB.getPosts());
  const [comments, setComments] = useState(()=>DB.getComments());
  const [marketplace, setMarketplace] = useState(()=>DB.getMarketplace());
  const [activeChannelId, setActiveChannelId] = useState(null);
  const [showTestModal, setShowTestModal] = useState(false);

  useEffect(()=>{if(!data){const d=seedData();setData(d);DB.setData(d);}}, []);
  useEffect(()=>{if(Object.keys(posts).length===0&&data){const p=seedPosts();setPosts(p);DB.setPosts(p);}}, [data]);
  useEffect(()=>{if(Object.keys(comments).length===0&&data){const c=seedComments();setComments(c);DB.setComments(c);}}, [data]);
  useEffect(()=>{if(marketplace.length===0&&data){const m=seedMarketplace();setMarketplace(m);DB.setMarketplace(m);}}, [data]);
  useEffect(()=>{if(user)DB.setUser(user);},[user]);
  useEffect(()=>{if(data)DB.setData(data);},[data]);
  useEffect(()=>{DB.setPosts(posts);},[posts]);
  useEffect(()=>{DB.setComments(comments);},[comments]);
  useEffect(()=>{DB.setMarketplace(marketplace);},[marketplace]);

  const handleLogin = (u) => setUser(u);
  const handleLogout = () => { setUser(null); DB.setUser(null); };
  const handleTestPass = () => { setUser(prev => ({...prev, testPassed: true, role: prev.role === 'guest' ? 'member' : prev.role})); };

  if(!user) return <LoginScreen onLogin={handleLogin}/>;
  if(!data) return null;

  const channel = data.channels.find(c=>c.id===activeChannelId);
  const channelCategory = channel ? data.categories.find(cat=>cat.id===channel.categoryId) : null;
  const isPrivateChannel = channelCategory?.visibility === 'private';
  const canViewChannel = !isPrivateChannel || user.role === 'admin' || user.role === 'member' || user.testPassed === true;
  const isAdmin = user.role === 'admin';

  const deletePost = (channelId, postId) => { if(!confirm('¿Eliminar?')) return; setPosts(prev=>({...prev,[channelId]:(prev[channelId]||[]).filter(p=>p.id!==postId)})); setComments(prev=>{const n={...prev};delete n[postId];return n;}); };
  const addComment = (postId, text) => { const c = {id:'c-'+uid(),text,author:user.name,authorRole:user.role,createdAt:new Date().toISOString()}; setComments(prev=>({...prev,[postId]:[...(prev[postId]||[]),c]})); };
  const deleteComment = (postId, commentId) => { setComments(prev=>({...prev,[postId]:(prev[postId]||[]).filter(c=>c.id!==commentId)})); };
  const deleteListing = (id) => { if(!confirm('¿Eliminar?')) return; setMarketplace(prev=>prev.filter(l=>l.id!==id)); };
  const toggleRole = (targetRole) => { setUser(prev => ({...prev, role: prev.role === targetRole ? 'guest' : targetRole})); };

  const channelTypeInfo = channel ? CHANNEL_TYPES[channel.type] : null;

  const WelcomeScreen = () => (
    <div style={{...S.empty, height:'100%', padding:24}}>
      <div style={{textAlign:'center', marginBottom:24}}>
        <div style={{width:120, height:120, margin:'0 auto 24px', position:'relative', borderRadius:24}}>
          <div style={{position:'absolute', inset:-2, borderRadius:26, background:'var(--rainbow)', backgroundSize:'200% 200%', animation:'rainbowBorder 4s ease infinite'}}/>
          <div style={{position:'absolute', inset:4, borderRadius:20, background:'var(--bg-deep)', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column'}}>
            <span style={{fontSize:36, fontWeight:900, fontFamily:"'Outfit',sans-serif", background:'var(--rainbow)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent', backgroundSize:'200% 200%', animation:'rainbowBorder 4s ease infinite'}}>RAL</span>
            <span style={{fontSize:9, fontWeight:600, color:'var(--text-dim)', marginTop:4}}>Rope Access Latino</span>
          </div>
        </div>
        <div style={{fontSize:26, fontWeight:800, color:'var(--text)', fontFamily:"'Outfit',sans-serif", marginBottom:8}}>Bienvenido a RAL</div>
        <div style={{fontSize:14, color:'var(--text-muted)', maxWidth:400, margin:'0 auto', lineHeight:1.5}}>La comunidad latina de rope access</div>
      </div>
      {!user.testPassed ? (
        <div style={{background:'var(--bg-panel)', borderRadius:'var(--radius-xl)', padding:'28px 24px', maxWidth:480, margin:'0 auto', border:'1px solid var(--border)'}}>
          <div style={{fontSize:20, fontWeight:700, marginBottom:8}}>🧗 ¿Te conviene hacer el curso?</div>
          <div style={{fontSize:13, color:'var(--text-muted)', marginBottom:20, lineHeight:1.55}}>
            Hacé nuestro test gratuito — 7 preguntas sobre edad, visa, inglés, condición física y experiencia. Basado en la experiencia real de técnicos IRATA en NZ. Obtené recomendaciones personalizadas y desbloqueá las secciones privadas.
          </div>
          <button style={{...S.primaryBtn, width:'100%', padding:'12px', fontSize:13}} onClick={()=>setShowTestModal(true)}>
            📝 Comenzar test gratuito
          </button>
        </div>
      ) : (
        <div style={{background:'var(--success-bg)', border:'1px solid var(--success)', borderRadius:'var(--radius-xl)', padding:'20px 24px', maxWidth:480, margin:'0 auto', textAlign:'center'}}>
          <div style={{fontSize:32}}>✅</div>
          <div style={{fontSize:18, fontWeight:700, marginTop:8}}>Test completado</div>
          <div style={{fontSize:13, marginTop:8, color:'var(--text-muted)'}}>Ya tenés acceso a las secciones privadas. Explorá el menú lateral.</div>
          <button style={{...S.ghostBtn, marginTop:14}} onClick={()=>setShowTestModal(true)}>🔄 Rehacer test</button>
        </div>
      )}
    </div>
  );

  return (
    <div style={S.app}>
      <Sidebar
        data={data} user={user}
        activeChannelId={activeChannelId}
        onSelectChannel={setActiveChannelId}
        onLogout={handleLogout}
        onToggleAdmin={()=>toggleRole('admin')}/>
      <div style={S.main}>
        {!channel ? <WelcomeScreen /> : !canViewChannel ? <LockedView onUpgrade={()=>setShowTestModal(true)}/> : (
          <>
            <div style={S.header}>
              <div style={S.headerInfo}>
                <div style={S.headerTitle}>{channel.name}</div>
                <div style={S.headerDesc}>
                  {channelTypeInfo?.desc || 'Canal'}{channelCategory && ` · ${channelCategory.emoji} ${channelCategory.name}`}
                </div>
              </div>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                {isPrivateChannel && <span style={{...S.headerBadge, color:'var(--member)', borderColor:'var(--member)', background:'var(--member-bg)'}}>🔒 Miembros</span>}
              </div>
            </div>
            <div style={S.content}>
              {channel.type === 'announcement' && <AnnouncementView channel={channel} posts={posts[channel.id]||[]} user={user} onNewPost={()=>{}} onDeletePost={(pid)=>deletePost(channel.id,pid)}/>}
              {channel.type === 'discussion' && <DiscussionView channel={channel} posts={posts[channel.id]||[]} comments={comments} user={user} onNewPost={()=>{}} onDeletePost={(pid)=>deletePost(channel.id,pid)} onAddComment={addComment} onDeleteComment={deleteComment}/>}
              {channel.type === 'marketplace' && <MarketplaceView listings={marketplace} user={user} onNew={()=>{}} onDelete={deleteListing}/>}
              {channel.type === 'resource' && <ResourceView channel={channel} posts={posts[channel.id]||[]} user={user} onNewPost={()=>{}} onDeletePost={(pid)=>deletePost(channel.id,pid)}/>}
            </div>
          </>
        )}
      </div>
      {showTestModal && <TestModal onClose={()=>setShowTestModal(false)} onPass={handleTestPass}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
