function timeAgo(iso) {
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'ahora';
  if(diff < 3600) return Math.floor(diff/60) + 'm';
  if(diff < 86400) return Math.floor(diff/3600) + 'h';
  if(diff < 604800) return Math.floor(diff/86400) + 'd';
  return new Date(iso).toLocaleDateString('es', {day:'numeric',month:'short'});
}

// AVATAR & ROLE BADGE
// ═══════════════════════════════════════════════════════════════════════════
function getAvatarColor(name) {
  const colors = ['#e74c3c','#2ecc40','#f1c40f','#6cb4ee','#e84393','#22d3ee','#a78bfa','#f97316','#14b8a6','#8b5cf6'];
  let h = 0; for(let i=0;i<(name||'').length;i++) h = ((h<<5)-h)+name.charCodeAt(i);
  return colors[Math.abs(h) % colors.length];
}
function Avatar({name,size=30,style:extra}) {
  const c = getAvatarColor(name);
  return <div style={{...S.postAvatar,width:size,height:size,background:c+'22',color:c,fontSize:Math.round(size*0.43),...extra}}>
    {(name||'?').charAt(0).toUpperCase()}
  </div>;
}
function RoleBadge({role,style:extra}) {
  const bg = role==='admin'?'var(--danger-bg)':role==='member'?'var(--member-bg)':'var(--bg-raised)';
  const color = ROLE_COLORS[role]||'var(--text-dim)';
  return <span style={{...S.postAuthorRole,background:bg,color,...extra}}>{ROLES[role]||role}</span>;
}

// ✨ TEST MODAL — MEJORADO: sin puntos visibles, opciones desordenadas, diseño lindo
// ═══════════════════════════════════════════════════════════════════════════
function TestModal({ onClose, onPass }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [score, setScore] = useState(0);
  const [passed, setPassed] = useState(false);
  const [advice, setAdvice] = useState('');
  const [shuffledOptions, setShuffledOptions] = useState({});

  // Preguntas limpias: sin emojis de pista, solo texto descriptivo
  const TEST_QUESTIONS = [
    { id: 'eng', emoji: '🎓', text: '¿Cuál es tu nivel de inglés?', options: [
        { label: 'A1 (Muy básico)', points: 0 },
        { label: 'A2 (Básico)', points: 5 },
        { label: 'B1 (Intermedio - suficiente para instrucciones)', points: 15 },
        { label: 'B2 (Intermedio alto)', points: 20 },
        { label: 'C1+ (Avanzado o nativo)', points: 25 }
    ]},
    { id: 'climb', emoji: '🧗', text: 'Experiencia previa en escalada o altura', options: [
        { label: 'Ninguna', points: 0 },
        { label: 'Básica (he escalado algunas veces)', points: 10 },
        { label: 'Moderada (escalada deportiva o trabajos ocasionales)', points: 18 },
        { label: 'Avanzada (escalador regular o profesional)', points: 25 }
    ]},
    { id: 'trade', emoji: '🔧', text: '¿Tienes algún oficio? (carpintero, pintor, etc.)', options: [
        { label: 'No', points: 0 },
        { label: 'Sí, pero poca experiencia', points: 10 },
        { label: 'Sí, varios años', points: 20 }
    ]},
    { id: 'fitness', emoji: '💪', text: 'Describe tu condición física actual', options: [
        { label: 'Mala (sedentario)', points: 0 },
        { label: 'Regular (ejercicio ocasional)', points: 6 },
        { label: 'Buena (entreno 2-3 veces/semana)', points: 15 },
        { label: 'Muy buena (4+ veces/semana)', points: 20 },
        { label: 'Atleta', points: 25 }
    ]},
    { id: 'workexp', emoji: '🏗️', text: 'Experiencia laboral en trabajos físicos', options: [
        { label: 'Ninguna (oficinista, sin manual)', points: 0 },
        { label: 'Alguna (trabajos eventuales físicos)', points: 10 },
        { label: 'Bastante (años en construcción, mantenimiento)', points: 20 }
    ]},
    { id: 'teamwork', emoji: '🤝', text: 'Trabajo en equipo y comunicación', options: [
        { label: 'Poco (prefiero solo)', points: 0 },
        { label: 'Regular (lo necesario)', points: 6 },
        { label: 'Bien (colaboro activamente)', points: 15 },
        { label: 'Muy bien (liderazgo, comunicación clara)', points: 20 }
    ]}
  ];

  // Shuffle options al montar el modal (para que cada test sea único y el usuario lea)
  useEffect(() => {
    const shuffled = {};
    TEST_QUESTIONS.forEach(q => {
      const copy = [...q.options];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      shuffled[q.id] = copy;
    });
    setShuffledOptions(shuffled);
  }, []);

  const handleAnswer = (qId, points) => {
    setAnswers(prev => ({ ...prev, [qId]: points }));
  };

  const calculateScore = () => {
    let total = 0;
    TEST_QUESTIONS.forEach(q => {
      const selected = answers[q.id];
      if (selected !== undefined) total += selected;
    });
    const passedFlag = total >= 70;
    let adviceMsg = '';
    if (!passedFlag) {
      let missing = [];
      if ((answers.eng||0) < 15) missing.push('🎓 Inglés (necesitas al menos B1)');
      if ((answers.fitness||0) < 15) missing.push('💪 Condición física (entrena 2-3 veces/semana)');
      if ((answers.trade||0) < 10) missing.push('🔧 Oficio o habilidad manual');
      if ((answers.climb||0) < 10) missing.push('🧗 Practica escalada en gimnasio');
      if ((answers.workexp||0) < 10) missing.push('🏗️ Busca trabajos eventuales físicos');
      if ((answers.teamwork||0) < 15) missing.push('🤝 Mejora comunicación en equipo');
      adviceMsg = `❌ No alcanzaste (${total}/70 puntos). Para ser un buen candidato a rope access:\n${missing.join('\n')}\n\n📘 Recursos: Test de inglés gratuito → preply.com | Ejercicios de calistenia 3 veces/semana.`;
    } else {
      adviceMsg = `✅ ¡Excelente! Obtuviste ${total}/70 puntos. Tienes el perfil adecuado para iniciar el curso IRATA.`;
    }
    setScore(total);
    setPassed(passedFlag);
    setAdvice(adviceMsg);
    setSubmitted(true);
    if (passedFlag) {
      onPass();
    }
  };

  const allAnswered = TEST_QUESTIONS.every(q => answers[q.id] !== undefined);
  const answeredCount = Object.keys(answers).length;
  const progress = (answeredCount / TEST_QUESTIONS.length) * 100;

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={{...S.modal, maxWidth: 680}} onClick={e=>e.stopPropagation()} className="fade-in">
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalKicker}>🧗 TEST DE APTITUD · BASADO EN EXPERIENCIA REAL</div>
            <div style={S.modalTitle}>¿Me conviene hacer el curso de rope access?</div>
          </div>
          <button style={S.closeBtn} onClick={onClose}>×</button>
        </div>
        <div style={S.modalBody}>
          {!submitted ? (
            <>
              <div style={{background:'var(--border)', height:6, borderRadius:3, marginBottom:20}}>
                <div style={{width:`${progress}%`, background:'var(--accent)', height:6, borderRadius:3, transition:'width 0.2s'}}/>
              </div>
              <div style={{marginBottom: 18, fontSize: 12, color: 'var(--text-muted)', textAlign: 'center'}}>
                🎲 Las opciones están mezcladas al azar — leé con atención
              </div>
              {TEST_QUESTIONS.map(q => {
                const opts = shuffledOptions[q.id] || q.options; // fallback si aún no shuffled
                return (
                  <div key={q.id} style={{marginBottom: 28}}>
                    <label style={{...S.label, fontSize: 12, marginBottom: 10}}>
                      {q.emoji} {q.text}
                    </label>
                    <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
                      {opts.map(opt => {
                        const isSelected = answers[q.id] === opt.points;
                        return (
                          <div
                            key={opt.label}
                            style={{
                              ...S.testOption,
                              ...(isSelected ? S.testOptionSelected : {}),
                              justifyContent: 'flex-start',
                              gap: 12
                            }}
                            onClick={() => handleAnswer(q.id, opt.points)}
                          >
                            <span style={{fontSize: 15, fontWeight: 500, color: isSelected ? 'var(--accent-text)' : 'var(--text)'}}>
                              {opt.label}
                            </span>
                            {isSelected && <span style={{marginLeft: 'auto', fontSize: 18}}>✓</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              <button style={{...S.primaryBtn, width: '100%', padding: '14px', fontSize: 14, marginTop: 8}} 
                disabled={!allAnswered} onClick={calculateScore}>
                🎯 Calificar mi perfil
              </button>
            </>
          ) : (
            <div>
              <div style={{textAlign: 'center', marginBottom: 20}}>
                <div style={{fontSize: 56}}>{passed ? '🎉🏆✨' : '📘💪📈'}</div>
                <div style={{fontSize: 32, fontWeight: 800, marginTop: 8, background: 'var(--rainbow)', WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent'}}>{score}/70</div>
                <div style={{color: passed ? 'var(--success)' : 'var(--warn)', fontWeight: 700, fontSize: 14, marginTop: 6}}>
                  {passed ? '✅ ¡Aprobado! Se desbloquean secciones privadas' : '❌ No alcanzaste el mínimo (70 puntos)'}
                </div>
              </div>
              <div style={{...S.adviceCard, background: 'var(--bg-raised)', padding: '18px', borderRadius: 'var(--radius-lg)', marginBottom: 16}}>
                <pre style={{whiteSpace: 'pre-wrap', fontFamily: 'inherit', fontSize: 13, lineHeight: 1.5, margin: 0}}>{advice}</pre>
              </div>
              <div style={{fontSize: 11, color: 'var(--text-faint)', textAlign: 'center', marginTop: 12, borderTop: '1px solid var(--border)', paddingTop: 12}}>
                📌 Test diseñado con la experiencia de <strong>Lionel Melo</strong>, técnico IRATA Nivel 3 e instructor.
              </div>
              {passed && (
                <button style={{...S.primaryBtn, width: '100%', marginTop: 20, padding: '12px'}} onClick={onClose}>
                  🧗 Continuar a la comunidad →
                </button>
              )}
              {!passed && (
                <button style={{...S.cancelBtn, width: '100%', marginTop: 20, padding: '12px'}} onClick={onClose}>
                  Cerrar (puedes reintentar luego)
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

          <div><label style={S.label}>Precio</label><input style={S.input} value={price} onChange={e=>setPrice(e.target.value)} placeholder="$120 USD"/></div>
        </div>
        <label style={S.label}>Contacto</label>
        <input style={S.input} value={contact} onChange={e=>setContact(e.target.value)} placeholder="WhatsApp, email, etc."/>
      </div>
      <div style={S.modalFooter}>
        <button style={S.cancelBtn} onClick={onClose}>Cancelar</button>
        <button style={{...S.primaryBtn,opacity:(title.trim()&&body.trim())?1:0.5}} onClick={save}>Publicar</button>
      </div>
    </div>
  </div>
  );
}
