const DB = {
  _get(k, fallback) { try { const v = localStorage.getItem('ral-community-'+k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  _set(k, v) { try { localStorage.setItem('ral-community-'+k, JSON.stringify(v)); } catch {} },
  getUser() { return this._get('user', null); },
  setUser(u) { this._set('user', u); },
  getData() { return this._get('data-v1', null); },
  setData(d) { this._set('data-v1', d); },
  getPosts() { return this._get('posts', {}); },
  setPosts(p) { this._set('posts', p); },
  getComments() { return this._get('comments', {}); },
  setComments(c) { this._set('comments', c); },
  getMarketplace() { return this._get('marketplace', []); },

};

function timeAgo(iso) {
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if(diff < 60) return 'ahora';
  if(diff < 3600) return Math.floor(diff/60) + 'm';
  if(diff < 86400) return Math.floor(diff/3600) + 'h';
  if(diff < 604800) return Math.floor(diff/86400) + 'd';
  return new Date(iso).toLocaleDateString('es', {day:'numeric',month:'short'});
}

// AVATAR HELPER
// ═══════════════════════════════════════════════════════════════════════════
function getAvatarColor(name) {
  const colors = ['#e74c3c','#2ecc40','#f1c40f','#6cb4ee','#e84393','#22d3ee','#a78bfa','#f97316','#14b8a6','#8b5cf6'];
  let h = 0; for(let i=0;i<(name||'').length;i++) h = ((h<<5)-h)+name.charCodeAt(i);
  return colors[Math.abs(h) % colors.length];
}
function Avatar({name,size=30,style:extra}) {
  const c = getAvatarColor(name);
  return <div style={{...S.postAvatar,width:size,height:size,background:c+'22',color:c,fontSize:Math.round(size*0.43),...extra}}>
    {(name||'?').charAt(0).toUpperCase()}
  </div>;
}
function RoleBadge({role,style:extra}) {
  const bg = role==='admin'?'var(--danger-bg)':role==='member'?'var(--member-bg)':'var(--bg-raised)';
  const color = ROLE_COLORS[role]||'var(--text-dim)';
  return <span style={{...S.postAuthorRole,background:bg,color,...extra}}>{ROLES[role]||role}</span>;
}

  const isAdmin = user?.role === 'admin';
  const sorted = [...(posts||[])].sort((a,b)=>{

  return (
  <div>

      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>

          <div style={S.postFooter}>
            <span style={S.postStat} onClick={()=>onDeletePost(p.id)}>🗑 Eliminar</span>

        )}
      </div>
    ))}
  </div>
  );
}

function DiscussionView({channel, posts, comments, user, onNewPost, onDeletePost, onAddComment, onDeleteComment}) {
  const isAdmin = user?.role === 'admin';
  const [expandedPost, setExpandedPost] = useState(null);
  const [commentText, setCommentText] = useState('');
  const sorted = [...(posts||[])].sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    return new Date(b.createdAt)-new Date(a.createdAt);
  });

  const submitComment = (postId) => {
    if(!commentText.trim()) return;
    onAddComment(postId, commentText.trim());
    setCommentText('');
  };

  return (
  <div>
    {isAdmin && (
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo tema</button>
      </div>
    )}
    {sorted.length === 0
      ? <div style={S.empty}><span style={S.emptyIcon}>💬</span><span style={S.emptyText}>Sin temas todavía</span></div>
      : sorted.map(p=>{
      const postComments = comments[p.id] || [];
      const isExpanded = expandedPost === p.id;
      return (
      <div key={p.id} style={{marginBottom:16,animation:'fadeIn 0.25s ease-out'}}>
        <div style={{...S.postCard,...(p.pinned?S.postPinned:{}),marginBottom:0,borderRadius:isExpanded?'var(--radius-lg) var(--radius-lg) 0 0':'var(--radius-lg)'}}
          onClick={()=>setExpandedPost(isExpanded?null:p.id)}>
          <div style={S.postAuthorRow}>
            <Avatar name={p.author}/>
            <span style={S.postAuthorName}>{p.author}</span>
            <RoleBadge role={p.authorRole}/>
            {p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}
            <span style={S.postTime}>{timeAgo(p.createdAt)}</span>
          </div>
          <div style={S.postTitle}>{p.title}</div>
          <div style={{...S.postBody,...(!isExpanded?{maxHeight:80,overflow:'hidden',WebkitMaskImage:postComments.length>0||p.body.length>200?'linear-gradient(to bottom, black 60%, transparent 100%)':undefined}:{})}}>{p.body}</div>
          <div style={S.postFooter}>
            <span style={{...S.postStat,...(isExpanded?{color:'var(--accent-text)',background:'var(--accent-bg)'}:{})}}>
              💬 {postComments.length} comentario{postComments.length===1?'':'s'}
            </span>
            {isAdmin && <span style={S.postStat} onClick={(e)=>{e.stopPropagation();onDeletePost(p.id);}}>🗑</span>}

        <div style={{background:'var(--bg-raised)',border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--radius-lg) var(--radius-lg)',padding:'14px 18px'}} className="fade-in">

                  <span style={{fontSize:10,color:'var(--text-faint)',marginLeft:'auto',fontFamily:"'JetBrains Mono',monospace"}}>{timeAgo(c.createdAt)}</span>

          </div>
        </div>
        )}
      </div>

    })}

  );

            {l.location && <span style={S.mkTag}>📍 {l.location}</span>}
            {l.price && <span style={{...S.mkTag,color:'var(--success)'}}>💰 {l.price}</span>}
            {l.contact && <span style={{...S.mkTag,color:'var(--accent-text)'}}>📱 {l.contact}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12,paddingTop:10,borderTop:'1px solid var(--border)'}}>
            <Avatar name={l.author} size={22}/>
            <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{l.author}</span>
            <RoleBadge role={l.authorRole} style={{fontSize:7,padding:'1px 5px'}}/>
            {(isAdmin || l.author === user?.name) && (
              <span style={{...S.postStat,marginLeft:'auto'}} onClick={()=>onDelete(l.id)}>🗑</span>
            )}
          </div>
        </div>
      </div>
      );
    })}
    {!canPost && (
      <div style={{textAlign:'center',padding:'20px',color:'var(--text-dim)',fontSize:12,border:'1px dashed var(--border)',borderRadius:'var(--radius)',marginTop:12}}>
        🔒 Solo miembros pueden publicar en el marketplace. <span style={{color:'var(--member)',cursor:'pointer'}}>Hazte miembro →</span>
      </div>
    )}
  </div>
  );
}

function ResourceView({channel, posts, user, onNewPost, onDeletePost}) {
  const isAdmin = user?.role === 'admin';
  const sorted = [...(posts||[])].sort((a,b)=>{
    if(a.pinned&&!b.pinned) return -1;
    if(!a.pinned&&b.pinned) return 1;
    return new Date(b.createdAt)-new Date(a.createdAt);
  });
  return (
  <div>
    {isAdmin && <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}><button style={S.primaryBtn} onClick={onNewPost}>+ Nuevo recurso</button></div>}
    {sorted.length===0
      ? <div style={S.empty}><span style={S.emptyIcon}>📚</span><span style={S.emptyText}>Sin recursos todavía</span></div>
      : sorted.map(p=>(
      <div key={p.id} style={{...S.postCard,...(p.pinned?S.postPinned:{}),cursor:'default'}}>
        <div style={S.postAuthorRow}>
          <Avatar name={p.author}/>
          <span style={S.postAuthorName}>{p.author}</span>
          <RoleBadge role={p.authorRole}/>
          {p.pinned && <span style={{fontSize:12,color:'var(--accent)'}}>📌</span>}
          <span style={S.postTime}>{timeAgo(p.createdAt)}</span>
        </div>
        <div style={S.postTitle}>{p.title}</div>
        <div style={S.postBody}>{p.body}</div>
        {isAdmin && <div style={S.postFooter}><span style={S.postStat} onClick={()=>onDeletePost(p.id)}>🗑</span></div>}
      </div>
    ))}
  </div>
  );
}

function LockedView({onUpgrade}) {
  return (
  <div style={S.lockedOverlay}>
    <div style={S.lockIcon}>🔒</div>
    <div style={S.lockTitle}>Contenido exclusivo para miembros</div>
    <div style={S.lockDesc}>Esta sección es solo para miembros de la comunidad RAL. Obtené acceso a contenido técnico, cursos, descuentos y más.</div>
    <button style={S.lockBtn} onClick={onUpgrade}>⭐ Hacete miembro</button>
  </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════
function Sidebar({data, user, activeChannelId, onSelectChannel, onAddCategory, onEditCategory, onAddChannel, onLogout, onToggleAdmin, onToggleMember}) {
  const [collapsed, setCollapsed] = useState({});
  const sortedCats = useMemo(()=>[...data.categories].sort((a,b)=>(a.order??999)-(b.order??999)),[data.categories]);
  const isAdmin = user?.role === 'admin';

  return (
  <div style={S.sidebar}>
    <div style={S.brand}>
      <div style={S.brandLogo}>
        <div style={{position:'absolute',inset:0,borderRadius:12,padding:2,background:'var(--rainbow)',backgroundSize:'200% 200%',animation:'rainbowBorder 4s ease infinite'}}/>
        <div style={S.brandLogoInner}><span style={{fontSize:11,fontWeight:900,fontFamily:"'Outfit',sans-serif"}}>RAL</span></div>
      </div>
      <div style={S.brandText}>
        <div style={S.brandTitle}>Rope Access Latino</div>
        <div style={S.brandSub}>Community</div>
      </div>
    </div>

    <div style={S.onlineBar}>
      <span style={S.onlineDot}/>
      <span style={S.onlineText}>42 online</span>
    </div>

    <div style={S.catList}>
      {isAdmin && (
        <div style={{padding:'6px 4px 10px',display:'flex',gap:4}}>
          <button style={{...S.ghostBtn,flex:1,justifyContent:'center',fontSize:10}} onClick={onAddCategory}>+ Categoría</button>
        </div>
      )}

      {sortedCats.map(cat=>{
        const catChannels = data.channels.filter(c=>c.categoryId===cat.id);
        const isPrivate = cat.visibility === 'private';
        const isOpen = !collapsed[cat.id];
        const canView = !isPrivate || user?.role === 'admin' || user?.role === 'member';

        return (
        <div key={cat.id} style={S.catWrap}>
          <div style={S.catHeader} onClick={()=>setCollapsed(prev=>({...prev,[cat.id]:!prev[cat.id]}))}>
            <span style={{...S.catCaret,transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
            <span style={S.catEmoji}>{cat.emoji}</span>
            <span style={S.catName}>{cat.name}</span>
            {isPrivate && <span style={S.catPrivateBadge}>🔒</span>}
            {isAdmin && <button style={S.catAddBtn} onClick={e=>{e.stopPropagation();onAddChannel(cat.id);}}>+</button>}
          </div>
          {isOpen && canView && catChannels.map(ch=>{
            const isActive = activeChannelId === ch.id;
            return (
            <div key={ch.id}
              style={{...S.chItem,...(isActive?S.chItemActive:{})}}
              onClick={()=>onSelectChannel(ch.id)}
              onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background='var(--bg-hover)';}}
              onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}>
              <span>{ch.name}</span>
            </div>
            );
          })}
          {isOpen && !canView && (
            <div style={{padding:'6px 22px',fontSize:11,color:'var(--text-faint)',fontStyle:'italic'}}>🔒 Solo miembros</div>
          )}
        </div>
        );
      })}
    </div>

    <div style={S.userBar}>
      <Avatar name={user?.name} size={34}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={S.userName}>{user?.name}</div>
        <div style={{display:'flex',gap:4,marginTop:3}}>
          <RoleBadge role={user?.role} style={{fontSize:7,padding:'1px 5px'}}/>
          {user?.level && <span style={{fontSize:8,color:'var(--text-dim)',fontFamily:"'JetBrains Mono',monospace"}}>{user.level}</span>}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        <button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px',fontFamily:"'JetBrains Mono',monospace"}}
          onClick={onToggleAdmin} title="Toggle admin role">
          {user?.role==='admin'?'👑':'🔧'}
        </button>
        <button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px',fontFamily:"'JetBrains Mono',monospace"}}
          onClick={onToggleMember} title="Toggle member role">
          ⭐
        </button>
        <button style={{background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:10,padding:'2px 4px'}}
          onClick={onLogout} title="Logout">🚪</button>
      </div>
    </div>
  </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(()=>DB.getUser());
  const [data, setData] = useState(()=>DB.getData());
  const [posts, setPosts] = useState(()=>DB.getPosts());
  const [comments, setComments] = useState(()=>DB.getComments());
  const [marketplace, setMarketplace] = useState(()=>DB.getMarketplace());
  const [activeChannelId, setActiveChannelId] = useState(null);
  const [showCatModal, setShowCatModal] = useState(null);
  const [showChModal, setShowChModal] = useState(null);
  const [showPostModal, setShowPostModal] = useState(false);
  const [showMkModal, setShowMkModal] = useState(false);

  // Init seed data
  useEffect(()=>{if(!data){const d=seedData();setData(d);DB.setData(d);}}, []);
  useEffect(()=>{if(Object.keys(posts).length===0&&data){const p=seedPosts();setPosts(p);DB.setPosts(p);}}, [data]);
  useEffect(()=>{if(Object.keys(comments).length===0&&data){const c=seedComments();setComments(c);DB.setComments(c);}}, [data]);
  useEffect(()=>{if(marketplace.length===0&&data){const m=seedMarketplace();setMarketplace(m);DB.setMarketplace(m);}}, [data]);

  // Persist
  useEffect(()=>{if(user)DB.setUser(user);},[user]);
  useEffect(()=>{if(data)DB.setData(data);},[data]);
  useEffect(()=>{DB.setPosts(posts);},[posts]);
  useEffect(()=>{DB.setComments(comments);},[comments]);
  useEffect(()=>{DB.setMarketplace(marketplace);},[marketplace]);

  const handleLogin = (u) => { setUser(u); };
  const handleLogout = () => { setUser(null); DB.setUser(null); };

  if(!user) return <LoginScreen onLogin={handleLogin}/>;
  if(!data) return null;

  const channel = data.channels.find(c=>c.id===activeChannelId);
  const channelCategory = channel ? data.categories.find(cat=>cat.id===channel.categoryId) : null;
  const isPrivateChannel = channelCategory?.visibility === 'private';
  const canViewChannel = !isPrivateChannel || user.role === 'admin' || user.role === 'member';
  const isAdmin = user.role === 'admin';

  // Category CRUD
  const saveCategory = (cat) => {
    setData(prev=>{
      const idx = prev.categories.findIndex(c=>c.id===cat.id);
      if(idx>=0){const cats=[...prev.categories];cats[idx]=cat;return{...prev,categories:cats};}
      return {...prev, categories:[...prev.categories, {...cat,order:prev.categories.length}]};
    });
  };
  // Channel CRUD
  const saveChannel = (ch) => {
    setData(prev=>{
      const idx = prev.channels.findIndex(c=>c.id===ch.id);
      if(idx>=0){const chs=[...prev.channels];chs[idx]=ch;return{...prev,channels:chs};}
      return {...prev, channels:[...prev.channels, ch]};
    });
    setActiveChannelId(ch.id);
  };
  const deleteChannel = (id) => {
    if(!confirm('¿Eliminar este canal?')) return;
    setData(prev=>({...prev,channels:prev.channels.filter(c=>c.id!==id)}));
    if(activeChannelId===id) setActiveChannelId(null);
  };
  // Post CRUD
  const createPost = (channelId, {title,body,pinned}) => {
    const post = {id:'p-'+uid(),title,body,pinned,author:user.name,authorRole:user.role,createdAt:new Date().toISOString()};
    setPosts(prev=>({...prev,[channelId]:[post,...(prev[channelId]||[])]}));
  };
  const deletePost = (channelId, postId) => {
    if(!confirm('¿Eliminar?')) return;
    setPosts(prev=>({...prev,[channelId]:(prev[channelId]||[]).filter(p=>p.id!==postId)}));
    setComments(prev=>{const n={...prev};delete n[postId];return n;});
  };
  // Comment CRUD
  const addComment = (postId, text) => {
    const c = {id:'c-'+uid(),text,author:user.name,authorRole:user.role,createdAt:new Date().toISOString()};
    setComments(prev=>({...prev,[postId]:[...(prev[postId]||[]),c]}));
  };
  const deleteComment = (postId, commentId) => {
    setComments(prev=>({...prev,[postId]:(prev[postId]||[]).filter(c=>c.id!==commentId)}));
  };
  // Marketplace CRUD
  const createListing = ({type,title,body,location,contact,price}) => {
    const l = {id:'mk-'+uid(),type,title,body,location,contact,price,author:user.name,authorRole:user.role,createdAt:new Date().toISOString(),active:true};
    setMarketplace(prev=>[l,...prev]);
  };
  const deleteListing = (id) => {
    if(!confirm('¿Eliminar publicación?')) return;
    setMarketplace(prev=>prev.filter(l=>l.id!==id));
  };

  const toggleRole = (targetRole) => {
    setUser(prev => ({...prev, role: prev.role === targetRole ? 'guest' : targetRole}));
  };

  // Channel type label for header
  const channelTypeInfo = channel ? CHANNEL_TYPES[channel.type] : null;

  return (
  <div style={S.app}>
    <Sidebar data={data} user={user} activeChannelId={activeChannelId}
      onSelectChannel={setActiveChannelId}
      onAddCategory={()=>setShowCatModal({editing:null})}
      onEditCategory={(cat)=>setShowCatModal({editing:cat})}
      onAddChannel={(catId)=>setShowChModal({categoryId:catId})}
      onLogout={handleLogout}
      onToggleAdmin={()=>toggleRole('admin')}
      onToggleMember={()=>toggleRole('member')}
    />

    <div style={S.main}>
      {!channel ? (
        <div style={{...S.empty,height:'100%'}}>
          <div style={{fontSize:64,opacity:0.3,marginBottom:8}}>🧗</div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--text)',fontFamily:"'Outfit',sans-serif",marginBottom:4}}>Bienvenido a RAL</div>
          <div style={{fontSize:13,color:'var(--text-dim)',maxWidth:400,textAlign:'center',lineHeight:1.6}}>
            Seleccioná un canal de la barra lateral para empezar. Explorá los canales públicos o hazte miembro para acceder al contenido exclusivo.
          </div>
          <div style={{display:'flex',gap:4,marginTop:12}}>
            <span style={{...S.ghostBtn,cursor:'default'}}>🔧 = toggle admin</span>
            <span style={{...S.ghostBtn,cursor:'default'}}>⭐ = toggle member</span>
            <span style={{...S.ghostBtn,cursor:'default'}}>🚪 = logout</span>
          </div>
        </div>
      ) : !canViewChannel ? (
        <LockedView onUpgrade={()=>toggleRole('member')}/>
      ) : (
        <>
          <div style={S.header}>
            <div style={S.headerInfo}>
              <div style={S.headerTitle}>{channel.name}</div>
              <div style={S.headerDesc}>
                {channelTypeInfo?.desc || 'Canal'}
                {channelCategory && ` · ${channelCategory.emoji} ${channelCategory.name}`}
              </div>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              {isPrivateChannel && <span style={{...S.headerBadge,color:'var(--member)',borderColor:'var(--member)',background:'var(--member-bg)'}}>🔒 Miembros</span>}
              {isAdmin && <button style={{...S.ghostBtn,fontSize:10}} onClick={()=>deleteChannel(channel.id)}>🗑</button>}
            </div>
          </div>
          <div style={S.content}>
            {channel.type === 'announcement' && (
              <AnnouncementView channel={channel} posts={posts[channel.id]||[]} user={user}
                onNewPost={()=>setShowPostModal(true)} onDeletePost={(pid)=>deletePost(channel.id,pid)}/>
            )}
            {channel.type === 'discussion' && (
              <DiscussionView channel={channel} posts={posts[channel.id]||[]} comments={comments} user={user}
                onNewPost={()=>setShowPostModal(true)} onDeletePost={(pid)=>deletePost(channel.id,pid)}
                onAddComment={addComment} onDeleteComment={deleteComment}/>
            )}
            {channel.type === 'marketplace' && (
              <MarketplaceView listings={marketplace} user={user}
                onNew={()=>setShowMkModal(true)} onDelete={deleteListing}/>
            )}
            {channel.type === 'resource' && (
              <ResourceView channel={channel} posts={posts[channel.id]||[]} user={user}
                onNewPost={()=>setShowPostModal(true)} onDeletePost={(pid)=>deletePost(channel.id,pid)}/>
            )}
          </div>
        </>
      )}
    </div>

    {showCatModal && <CategoryModal onClose={()=>setShowCatModal(null)} onSave={saveCategory} editing={showCatModal.editing}/>}
    {showChModal && <ChannelModal onClose={()=>setShowChModal(null)} onSave={saveChannel} categoryId={showChModal.categoryId}/>}
    {showPostModal && channel && <PostModal onClose={()=>setShowPostModal(false)} onSave={(p)=>createPost(channel.id,p)} channelName={channel.name}/>}
    {showMkModal && <MarketplaceModal onClose={()=>setShowMkModal(false)} onSave={createListing} user={user}/>}
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
